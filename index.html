<title>VIVAFIX Signature</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#07110f;--bg2:#0d1a17;--ink:#f4f0e8;--muted:#a8b1aa;
  --glass:rgba(13,29,25,.62);--glass2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.12);--gold:#e8c88a;--emerald:#2f8b72;
  --coral:#d8796a;--blue:#6d8ff5;--shadow:0 30px 80px rgba(0,0,0,.38);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
body{overflow-x:hidden}
body::before{content:"";position:fixed;inset:-20%;z-index:-3;background:
radial-gradient(circle at 16% 8%,rgba(46,135,111,.35),transparent 30%),
radial-gradient(circle at 88% 14%,rgba(219,126,105,.24),transparent 28%),
radial-gradient(circle at 75% 82%,rgba(87,111,183,.22),transparent 32%),
linear-gradient(135deg,#06100e 0%,#0d1714 46%,#101218 100%);
animation:sky 16s ease-in-out infinite alternate}
@keyframes sky{to{transform:scale(1.06) translate3d(-1.5%,1%,0)}}
body::after{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:.24;
background-image:
linear-gradient(120deg,transparent 0 44%,rgba(255,255,255,.04) 45%,transparent 46%),
radial-gradient(circle,rgba(255,255,255,.18) 0 1px,transparent 1.2px);
background-size:100% 100%,38px 38px;mask-image:linear-gradient(to bottom,black,transparent 78%)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.shell{max-width:620px;margin:auto;min-height:100dvh;padding:calc(env(safe-area-inset-top) + 18px) 18px calc(104px + env(safe-area-inset-bottom))}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px}
.brand img{width:48px;height:48px;border-radius:16px;box-shadow:0 18px 35px rgba(0,0,0,.3),0 0 30px rgba(232,200,138,.14)}
.brand h1{font-size:22px;letter-spacing:.18em;margin:0}
.brand small{display:block;color:var(--gold);letter-spacing:.18em;font-size:9px;margin-top:4px}
.avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--line);background:rgba(255,255,255,.06);backdrop-filter:blur(18px);color:var(--gold)}
main{min-height:65dvh}
.page-enter{animation:page .55s cubic-bezier(.18,.8,.18,1)}
@keyframes page{from{opacity:0;transform:translateY(18px) scale(.985);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}
.hero{position:relative;min-height:430px;border-radius:34px;overflow:hidden;padding:28px;background:
linear-gradient(145deg,rgba(8,28,23,.9),rgba(13,19,23,.68));border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow);isolation:isolate}
.hero::before{content:"";position:absolute;inset:0;background:
linear-gradient(180deg,rgba(255,255,255,.06),transparent 36%),
radial-gradient(circle at 80% 25%,rgba(232,200,138,.13),transparent 30%);z-index:-1}
.hero-copy{position:relative;z-index:4;max-width:74%}
.eyebrow{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
.hero h2{font-family:Georgia,"Times New Roman",serif;font-size:46px;line-height:.96;margin:16px 0 14px;font-weight:500}
.hero p{color:var(--muted);line-height:1.55;margin:0}
.scene{position:absolute;inset:0;transform-style:preserve-3d;perspective:900px}
.orb-wrap{position:absolute;right:-18px;bottom:28px;width:260px;height:260px;transform-style:preserve-3d}
.orb{position:absolute;inset:0;border-radius:50%;background:
radial-gradient(circle at 35% 26%,rgba(255,255,255,.96),rgba(255,255,255,.08) 16%,transparent 22%),
radial-gradient(circle at 40% 38%,#f0cfa2 0 10%,#c57672 28%,#556db5 58%,#152d26 78%);
box-shadow:inset -30px -35px 70px rgba(0,0,0,.42),0 38px 90px rgba(0,0,0,.48),0 0 70px rgba(221,160,140,.18);
animation:orbFloat 5.8s ease-in-out infinite;transform:translateZ(80px)}
.orb::after{content:"";position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(232,200,138,.24);box-shadow:0 0 45px rgba(232,200,138,.1)}
@keyframes orbFloat{50%{transform:translateY(-12px) rotate(4deg) translateZ(80px)}}
.ring{position:absolute;right:28px;bottom:67px;width:190px;height:190px;border-radius:50%;border:1px solid rgba(232,200,138,.22);transform:rotateX(72deg) rotateZ(-18deg);box-shadow:0 0 50px rgba(232,200,138,.06)}
.ring.r2{width:230px;height:230px;right:7px;bottom:47px;opacity:.5}
.stats{position:absolute;left:24px;bottom:24px;right:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;z-index:5}
.stat{background:rgba(255,255,255,.055);backdrop-filter:blur(22px);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px}
.stat strong{display:block;font-size:24px;color:var(--gold)}.stat span{font-size:11px;color:var(--muted)}
.section-head{display:flex;justify-content:space-between;align-items:end;margin:24px 2px 12px}
.section-head h3{font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:24px;margin:0}
.section-head button{border:0;background:none;color:var(--gold)}
.bento{display:grid;grid-template-columns:1.18fr .82fr;gap:12px}
.tile{position:relative;min-height:155px;border-radius:26px;padding:20px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(255,255,255,.035));backdrop-filter:blur(22px);box-shadow:0 18px 42px rgba(0,0,0,.22);overflow:hidden;text-align:left;color:var(--ink);transform-style:preserve-3d;transition:transform .25s ease}
.tile:active{transform:scale(.98)}
.tile.wide{grid-column:1/-1;min-height:124px}
.tile h4{font-family:Georgia,"Times New Roman",serif;font-size:24px;font-weight:500;margin:0 0 9px}
.tile p{color:var(--muted);margin:0;max-width:75%;line-height:1.45}
.tile .glyph{position:absolute;right:16px;bottom:10px;font-size:64px;opacity:.13}
.tile.mail{background:linear-gradient(145deg,rgba(74,91,136,.3),rgba(19,27,37,.6))}
.tile.ai{background:linear-gradient(145deg,rgba(115,66,101,.34),rgba(24,23,31,.7))}
.tile.plan{background:linear-gradient(145deg,rgba(44,111,92,.34),rgba(15,28,24,.72))}
.tile.tasks{background:linear-gradient(145deg,rgba(133,100,52,.3),rgba(25,25,21,.7))}
.panel{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--line);border-radius:28px;padding:18px;margin-bottom:14px;box-shadow:0 18px 46px rgba(0,0,0,.22)}
.row{display:flex;gap:9px}.row>*{flex:1}
.input{width:100%;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.055);color:var(--ink);border-radius:16px;padding:13px;margin:5px 0;outline:none}
.input:focus{border-color:rgba(232,200,138,.7);box-shadow:0 0 0 4px rgba(232,200,138,.08)}
.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:750;color:#15211d;background:linear-gradient(135deg,#f0d9a8,#cfaa68);box-shadow:0 14px 30px rgba(184,137,66,.2)}
.btn.secondary{background:rgba(255,255,255,.07);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
.list{display:grid;gap:10px}
.item{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:15px;animation:item .35s both}
@keyframes item{from{opacity:0;transform:translateY(10px)}}
.item h3{margin:0 0 7px}.item p{margin:0;color:var(--muted);line-height:1.45}
.item footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;color:var(--gold);font-size:12px}
.item footer button{border:0;background:none;color:var(--muted);font-size:20px}
.chat{display:grid;gap:10px;margin-bottom:12px}
.bubble{max-width:88%;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid var(--line);line-height:1.5}
.bubble.me{justify-self:end;background:linear-gradient(135deg,#a66363,#5f6aa1)}
.composer{display:flex;gap:8px}.composer input{flex:1}
.ai-stage{height:280px;position:relative;overflow:hidden;text-align:center}
.ai-stage .orb-wrap{right:50%;transform:translateX(50%) scale(.72);bottom:-28px}
.chips{display:flex;gap:8px;overflow:auto;padding-bottom:6px}
.chips button{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--muted);border-radius:999px;padding:9px 12px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,620px);height:calc(82px + env(safe-area-inset-bottom));padding:8px 8px env(safe-area-inset-bottom);display:grid;grid-template-columns:repeat(6,1fr);background:rgba(6,13,12,.83);backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,.09);z-index:30}
.nav button{border:0;background:none;color:#7f8b85;display:flex;flex-direction:column;align-items:center;gap:4px}.nav b{font-size:20px}.nav small{font-size:9px}.nav .on{color:var(--gold)}.nav .on b{animation:pop .4s}@keyframes pop{50%{transform:scale(1.28) translateY(-2px)}}
.toast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translate(-50%,18px);opacity:0;z-index:70;background:#121d19;color:var(--ink);border:1px solid var(--line);padding:11px 15px;border-radius:14px;transition:.25s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}
.empty{text-align:center;padding:26px;color:var(--muted);border:1px dashed var(--line);border-radius:20px}
.switch-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}.switch{width:50px;height:29px;border-radius:999px;background:#26322f;padding:3px}.switch::after{content:"";display:block;width:23px;height:23px;border-radius:50%;background:#fff;transition:.25s}.switch.on{background:linear-gradient(135deg,#d7b56f,#f0d9a8)}.switch.on::after{transform:translateX(21px)}
@media(max-width:430px){.hero h2{font-size:40px}.hero{min-height:410px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ===== PLAN + TASKS PREMIUM UPGRADE ===== */
.swoosh-layer{
  position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;
  background:
    radial-gradient(circle at 20% 50%,rgba(232,200,138,.28),transparent 28%),
    linear-gradient(110deg,transparent 0 34%,rgba(255,255,255,.18) 43%,rgba(232,200,138,.32) 49%,rgba(255,255,255,.08) 55%,transparent 66%);
  transform:translateX(-115%) skewX(-12deg);
}
.swoosh-layer.play{
  animation:swooshPass .62s cubic-bezier(.18,.8,.2,1);
}
@keyframes swooshPass{
  0%{opacity:0;transform:translateX(-115%) skewX(-12deg)}
  22%{opacity:1}
  72%{opacity:.9}
  100%{opacity:0;transform:translateX(115%) skewX(-12deg)}
}
.plan-shell,.tasks-shell{
  position:relative;overflow:hidden;border-radius:30px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 30px 70px rgba(0,0,0,.28);
}
.plan-shell{
  background:
    radial-gradient(circle at 82% 18%,rgba(232,200,138,.18),transparent 26%),
    linear-gradient(155deg,rgba(24,42,36,.95),rgba(8,17,15,.96));
}
.tasks-shell{
  background:
    radial-gradient(circle at 78% 12%,rgba(199,119,95,.18),transparent 28%),
    linear-gradient(155deg,rgba(39,30,25,.96),rgba(10,15,14,.97));
}
.plan-top,.tasks-top{
  padding:22px 22px 16px;position:relative;z-index:2;
}
.plan-top h2,.tasks-top h2{
  font-family:Georgia,"Times New Roman",serif;font-weight:500;font-size:34px;margin:8px 0 6px;
}
.plan-top p,.tasks-top p{margin:0;color:var(--muted);line-height:1.45}
.plan-accent,.tasks-accent{
  position:absolute;right:-24px;top:-28px;width:150px;height:150px;border-radius:50%;
  filter:blur(2px);opacity:.85;
}
.plan-accent{
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.9),rgba(232,200,138,.35) 18%,rgba(66,108,91,.35) 48%,transparent 68%);
}
.tasks-accent{
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.9),rgba(219,137,111,.38) 18%,rgba(105,77,58,.35) 48%,transparent 68%);
}
.plan-grid,.tasks-grid{
  display:grid;gap:12px;padding:0 18px 18px;
}
.plan-grid{grid-template-columns:1fr 1fr}
.plan-grid .full,.tasks-grid .full{grid-column:1/-1}
.field-block{
  background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:12px 14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.field-block label{
  display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:7px
}
.field-block .input{margin:0;background:transparent;border:0;padding:6px 0;box-shadow:none}
.field-block .input:focus{box-shadow:none}
.save-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:0 18px 20px}
.save-row .btn{flex:1;min-height:52px}
.mini-badge{
  min-width:54px;height:54px;border-radius:18px;display:grid;place-items:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--gold);font-size:20px;
}
.timeline{
  position:relative;padding-left:26px;
}
.timeline::before{
  content:"";position:absolute;left:7px;top:8px;bottom:8px;width:1px;
  background:linear-gradient(var(--gold),rgba(232,200,138,.08));
}
.timeline .item{position:relative;padding-left:18px}
.timeline .item::before{
  content:"";position:absolute;left:-24px;top:19px;width:10px;height:10px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 0 5px rgba(232,200,138,.1);
}
.task-progress{
  display:flex;align-items:center;gap:14px;padding:0 22px 16px;
}
.progress-ring{
  --p:0;
  width:74px;height:74px;border-radius:50%;
  background:conic-gradient(var(--gold) calc(var(--p)*1%),rgba(255,255,255,.08) 0);
  display:grid;place-items:center;box-shadow:0 0 30px rgba(232,200,138,.08);
}
.progress-ring::after{
  content:attr(data-label);width:58px;height:58px;border-radius:50%;background:#111713;
  display:grid;place-items:center;color:var(--gold);font-weight:700;font-size:13px;
}
.task-progress div:last-child strong{display:block;font-size:20px}
.task-progress div:last-child span{color:var(--muted);font-size:13px}
.priority-pill{
  display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 9px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:11px
}
.priority-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--gold)}
.priority-pill.high::before{background:#dd7f6c}
.priority-pill.low::before{background:#61b895}
.task-item{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
}
.task-check{
  width:28px;height:28px;border-radius:10px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.04);display:grid;place-items:center;color:var(--gold)
}
.task-main h3{margin:0 0 5px}.task-main p{margin:0;color:var(--muted);font-size:13px}
.delete-x{border:0;background:none;color:var(--muted);font-size:20px}
@media(max-width:430px){
  .plan-grid{grid-template-columns:1fr}
  .plan-grid .full{grid-column:auto}
}

</style>
</head>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const store={get(k,d=[]){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}},set(k,v){localStorage.setItem(k,JSON.stringify(v))}};
const today=()=>new Date().toISOString().slice(0,10);
const esc=(s='')=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
let soundOn=localStorage.getItem('vfSound')!=='off', hapticOn=localStorage.getItem('vfHaptic')!=='off';
let accessToken='',tokenClient=null,gmailMessages=[];

function tap(success=false){
 if(soundOn)try{const C=window.AudioContext||window.webkitAudioContext,ctx=new C(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';const n=ctx.currentTime;o.frequency.setValueAtTime(success?600:420,n);o.frequency.exponentialRampToValueAtTime(success?900:330,n+.055);g.gain.setValueAtTime(.045,n);g.gain.exponentialRampToValueAtTime(.001,n+.08);o.start(n);o.stop(n+.09)}catch{}
 if(hapticOn&&navigator.vibrate)navigator.vibrate(success?22:9);
}
function toast(t){const x=$('#toast');x.textContent=t;x.classList.add('show');clearTimeout(x._t);x._t=setTimeout(()=>x.classList.remove('show'),1400)}
document.addEventListener('pointerdown',e=>{if(e.target.closest('button,.item,.switch'))tap()},{passive:true});

const orb=`<div class="orb-wrap"><div class="ring r2"></div><div class="ring"></div><div class="orb"></div></div>`;

const templates={
home:()=>{const tasks=store.get('tasks'),events=store.get('events'),open=tasks.filter(x=>!x.done),tod=events.filter(x=>x.date===today());return `
<section class="hero tilt">
<div class="hero-copy"><div class="eyebrow">Dein Tag. Neu gedacht.</div><h2>Alles fließt zusammen.</h2><p>Aufgaben, Termine, E-Mails und intelligente Unterstützung in einem ruhigen digitalen Raum.</p></div>
<div class="scene">${orb}</div>
<div class="stats"><div class="stat"><strong>${open.length}</strong><span>Aufgaben</span></div><div class="stat"><strong>${tod.length}</strong><span>Termine heute</span></div><div class="stat"><strong>${gmailMessages.length}</strong><span>E-Mails</span></div></div>
</section>
<div class="section-head"><h3>Dein Raum</h3><button data-pagejump="more">Anpassen</button></div>
<section class="bento">
<button class="tile ai tilt" data-pagejump="ai"><h4>VIVAFIX AI</h4><p>Frag, plane und organisiere deinen Tag.</p><span class="glyph">✦</span></button>
<button class="tile mail tilt" data-pagejump="mail"><h4>Mail</h4><p>Wichtiges zuerst.</p><span class="glyph">✉</span></button>
<button class="tile plan tilt" data-pagejump="calendar"><h4>Plan</h4><p>Termine als klare Timeline.</p><span class="glyph">□</span></button>
<button class="tile tasks tilt" data-pagejump="tasks"><h4>Aufgaben</h4><p>Fokus ohne Ablenkung.</p><span class="glyph">✓</span></button>
</section>`},
mail:()=>`<section class="panel"><div class="eyebrow">Inbox</div><h2>Dein Posteingang</h2><p style="color:var(--muted)">Sicher über Google verbinden. Dein Passwort bleibt bei Google.</p><div class="row"><button id="connectGmail" class="btn">Gmail verbinden</button><button id="refreshGmail" class="btn secondary">Aktualisieren</button></div></section><input id="mailSearch" class="input" placeholder="E-Mails durchsuchen…"><section id="mailList" class="list"></section>`,
ai:()=>`<section class="panel ai-stage"><div class="eyebrow">VIVAFIX Intelligence</div>${orb}</section><div class="chips"><button data-prompt="Was steht heute an?">Heute</button><button data-prompt="Zeig offene Aufgaben">Aufgaben</button><button data-prompt="Welche Aufgaben sind wichtig?">Prioritäten</button><button data-prompt="Fasse meine Notizen zusammen">Notizen</button></div><section id="chat" class="chat"></section><form id="chatForm" class="composer"><input id="chatInput" class="input" placeholder="Frag VIVAFIX…"><button class="btn">↑</button></form>`,
calendar:()=>`<section class="plan-shell">
<div class="plan-accent"></div>
<div class="plan-top"><div class="eyebrow">Zeit gestalten</div><h2>Dein nächster Moment.</h2><p>Plane Termine wie eine ruhige Timeline – klar, visuell und ohne Ablenkung.</p></div>

<div class="field-block"><label>Datum</label><input id="eventDate" class="input" type="date" value="${today()}" required></div>
<div class="field-block"><label>Uhrzeit</label><input id="eventTime" class="input" type="time" value="10:00" required></div>
</div>

</form>
</section>
<div class="section-head"><h3>Deine Timeline</h3><button type="button">Heute</button></div>
<section id="eventList" class="list timeline"></section>`,

<div class="field-block"><label>Datum</label><input id="taskDate" class="input" type="date" value="${today()}"></div>
<div class="field-block"><label>Priorität</label><select id="taskPriority" class="input"><option>hoch</option><option selected>mittel</option><option>niedrig</option></select></div>
</div>
</div>
<div class="save-row"><button class="btn">Aufgabe speichern</button><div class="mini-badge">✓</div></div>
</form>
</section>
<div class="section-head"><h3>Dein Fokus</h3><button type="button">Sortieren</button></div>
<section id="taskList" class="list"></section>`},
more:()=>`<section class="panel"><div class="eyebrow">Atmosphäre</div><h2>Interaktion</h2><div class="switch-row"><span>Klicksound</span><div id="soundSwitch" class="switch ${soundOn?'on':''}"></div></div><div class="switch-row"><span>Vibration</span><div id="hapticSwitch" class="switch ${hapticOn?'on':''}"></div></div></section><section class="panel"><div class="eyebrow">Verbindung</div><h2>Gmail</h2><input id="clientId" class="input" placeholder="…apps.googleusercontent.com" value="${esc(localStorage.getItem('gmailClientId')||'')}"><button id="saveClient" class="btn">Client-ID speichern</button></section><section class="panel"><div class="eyebrow">Gedanken</div><h2>Notizen</h2><form id="noteForm"><input id="noteTitle" class="input" placeholder="Titel" required><textarea id="noteText" class="input" rows="4" placeholder="Notiz" required></textarea><button class="btn">Notiz speichern</button></form></section><section id="noteList" class="list"></section>`
};

function playSwoosh(){
 const s=$('#swooshLayer');if(!s)return;
 s.classList.remove('play');void s.offsetWidth;s.classList.add('play');
}
function render(page){
 if(page==='calendar'||page==='tasks')playSwoosh();
 document.body.dataset.page=page;$('#view').innerHTML=(templates[page]||templates.home)();
 $$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page===page));
 $$('[data-pagejump]').forEach(b=>b.onclick=()=>render(b.dataset.pagejump));
 const v=$('#view');v.classList.remove('page-enter');void v.offsetWidth;v.classList.add('page-enter');
 initTilt();
 if(page==='tasks')tasks();if(page==='calendar')calendar();if(page==='ai')chat();if(page==='mail')mail();if(page==='more')more();
 scrollTo(0,0)
}
function initTilt(){
 $$('.tilt').forEach(el=>{el.onpointermove=e=>{const r=el.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;el.style.transform=`perspective(900px) rotateX(${-y*5}deg) rotateY(${x*7}deg) translateZ(0)`};el.onpointerleave=()=>el.style.transform=''})
}
function tasks(){let a=store.get('tasks');const draw=()=>{const done=a.filter(x=>x.done).length,p=a.length?Math.round(done/a.length*100):0;const ring=document.querySelector('.progress-ring');if(ring){ring.style.setProperty('--p',p);ring.dataset.label=p+'%'};const txt=document.querySelector('.task-progress strong');if(txt)txt.textContent=`${done} von ${a.length} erledigt`;$('#taskList').innerHTML=a.length?a.map(t=>`<article class="item task-item"><button class="task-check" data-toggle="${t.id}">${t.done?'✓':''}</button><div class="task-main"><h3>${esc(t.title)}</h3><p>${t.date||'Ohne Datum'} · <span class="priority-pill ${t.priority==='hoch'?'high':t.priority==='niedrig'?'low':''}">${t.priority}</span></p></div><button class="delete-x" data-del="${t.id}">×</button></article>`).join(''):'<div class="empty">Noch keine Aufgaben.</div>';$$('[data-toggle]').forEach(b=>b.onclick=()=>{const t=a.find(x=>x.id===b.dataset.toggle);t.done=!t.done;store.set('tasks',a);draw()});$$('[data-del]').forEach(b=>b.onclick=()=>{a=a.filter(x=>x.id!==b.dataset.del);store.set('tasks',a);draw()})};$('#taskForm').onsubmit=e=>{e.preventDefault();a.push({id:crypto.randomUUID(),title:$('#taskTitle').value.trim(),date:$('#taskDate').value,priority:$('#taskPriority').value,done:false});store.set('tasks',a);e.target.reset();draw();tap(true);toast('Aufgabe gespeichert')};draw()}
function calendar(){let a=store.get('events');const draw=()=>{const s=[...a].sort((x,y)=>(x.date+x.time).localeCompare(y.date+y.time));$('#eventList').innerHTML=s.length?s.map(ev=>`<article class="item"><h3>${esc(ev.title)}</h3><p>${ev.date} · ${ev.time} Uhr</p><footer><span>Termin</span><button data-del="${ev.id}">×</button></footer></article>`).join(''):'<div class="empty">Noch keine Termine.</div>';$$('[data-del]').forEach(b=>b.onclick=()=>{a=a.filter(x=>x.id!==b.dataset.del);store.set('events',a);draw()})};$('#eventForm').onsubmit=e=>{e.preventDefault();a.push({id:crypto.randomUUID(),title:$('#eventTitle').value.trim(),date:$('#eventDate').value,time:$('#eventTime').value});store.set('events',a);e.target.reset();draw();tap(true);toast('Termin gespeichert')};draw()}
function assistant(q){const l=q.toLowerCase(),tasks=store.get('tasks'),events=store.get('events'),notes=store.get('notes'),open=tasks.filter(t=>!t.done),due=open.filter(t=>t.date===today()),high=open.filter(t=>t.priority==='hoch');const m=q.match(/(?:erstelle|mach|lege)\s+(?:eine\s+)?aufgabe\s*:?\s*(.+)/i);if(m){const title=m[1].trim();tasks.push({id:crypto.randomUUID(),title,date:today(),priority:'mittel',done:false});store.set('tasks',tasks);return `Erledigt – „${title}“ wurde gespeichert.`}if(/heute|steht.*an/.test(l)){const ev=events.filter(e=>e.date===today());return `Heute hast du ${due.length} Aufgaben und ${ev.length} Termine.`}if(/offen|aufgaben/.test(l))return open.length?`Offene Aufgaben: ${open.map((x,i)=>`${i+1}. ${x.title}`).join(' · ')}`:'Du hast keine offenen Aufgaben.';if(/wichtig|priorität/.test(l))return high.length?`Wichtige Aufgaben: ${high.map(x=>x.title).join(', ')}`:'Keine Aufgabe ist als wichtig markiert.';if(/notiz/.test(l))return notes.length?`Du hast ${notes.length} Notizen. Die neuesten: ${notes.slice(-3).map(n=>n.title).join(', ')}`:'Du hast noch keine Notizen.';return 'Ich kann Aufgaben erstellen sowie Termine, Aufgaben und Notizen auswerten.'}
function chat(){let h=store.get('chat',[{role:'ai',text:'Hallo. Ich bin VIVAFIX. Was möchtest du heute ordnen?'}]);const draw=()=>$('#chat').innerHTML=h.map(x=>`<div class="bubble ${x.role==='me'?'me':''}">${esc(x.text)}</div>`).join('');const send=q=>{if(!q.trim())return;h.push({role:'me',text:q.trim()});draw();setTimeout(()=>{h.push({role:'ai',text:assistant(q)});store.set('chat',h);draw();tap(true)},360)};draw();$('#chatForm').onsubmit=e=>{e.preventDefault();const i=$('#chatInput');send(i.value);i.value=''};$$('[data-prompt]').forEach(b=>b.onclick=()=>send(b.dataset.prompt))}
function initGoogle(){const id=localStorage.getItem('gmailClientId');if(!id||!window.google?.accounts?.oauth2)return false;tokenClient=google.accounts.oauth2.initTokenClient({client_id:id,scope:'https://www.googleapis.com/auth/gmail.readonly',callback:r=>{if(r.error)return alert('Google-Anmeldung fehlgeschlagen: '+r.error);accessToken=r.access_token;render('mail');loadGmail()}});return true}
async function gmailFetch(path){const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/'+path,{headers:{Authorization:'Bearer '+accessToken}}),d=await r.json();if(!r.ok)throw new Error(d.error?.message||'Gmail-Fehler');return d}
async function loadGmail(){const list=$('#mailList');if(!accessToken){list.innerHTML='<div class="empty">Verbinde zuerst dein Gmail-Konto.</div>';return}list.innerHTML='<div class="panel">E-Mails werden geladen…</div>';try{const r=await gmailFetch('messages?maxResults=15&q=in%3Ainbox');gmailMessages=await Promise.all((r.messages||[]).map(async x=>{const m=await gmailFetch(`messages/${x.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`),hs=m.payload?.headers||[],h=n=>hs.find(z=>z.name.toLowerCase()===n.toLowerCase())?.value||'';return{from:h('From'),subject:h('Subject')||'(Kein Betreff)',snippet:m.snippet||''}}));drawMail(gmailMessages)}catch(e){list.innerHTML=`<div class="panel">${esc(e.message)}</div>`}}
function drawMail(a){$('#mailList').innerHTML=a.length?a.map(m=>`<article class="item"><h3>${esc(m.subject)}</h3><p><b>${esc(m.from)}</b><br>${esc(m.snippet)}</p></article>`).join(''):'<div class="empty">Keine E-Mails gefunden.</div>'}
function mail(){$('#connectGmail').onclick=()=>{if(!localStorage.getItem('gmailClientId')){toast('Client-ID zuerst unter Mehr speichern');render('more');return}if(!initGoogle())return alert('Google-Anmeldung lädt noch.');tokenClient.requestAccessToken({prompt:'consent'})};$('#refreshGmail').onclick=loadGmail;$('#mailSearch').oninput=e=>{const q=e.target.value.toLowerCase();drawMail(gmailMessages.filter(m=>(m.from+' '+m.subject+' '+m.snippet).toLowerCase().includes(q)))};loadGmail()}
function more(){$('#soundSwitch').onclick=e=>{soundOn=!soundOn;localStorage.setItem('vfSound',soundOn?'on':'off');e.currentTarget.classList.toggle('on',soundOn);if(soundOn)tap(true);toast(soundOn?'Klicksound an':'Klicksound aus')};$('#hapticSwitch').onclick=e=>{hapticOn=!hapticOn;localStorage.setItem('vfHaptic',hapticOn?'on':'off');e.currentTarget.classList.toggle('on',hapticOn);toast(hapticOn?'Vibration an':'Vibration aus')};$('#saveClient').onclick=()=>{const id=$('#clientId').value.trim();if(!id.endsWith('.apps.googleusercontent.com'))return alert('Ungültige Client-ID.');localStorage.setItem('gmailClientId',id);toast('Client-ID gespeichert')};let notes=store.get('notes');const draw=()=>{$('#noteList').innerHTML=notes.length?notes.slice().reverse().map(n=>`<article class="item"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><footer><span>Notiz</span><button data-del="${n.id}">×</button></footer></article>`).join(''):'<div class="empty">Noch keine Notizen.</div>';$$('[data-del]').forEach(b=>b.onclick=()=>{notes=notes.filter(n=>n.id!==b.dataset.del);store.set('notes',notes);draw()})};$('#noteForm').onsubmit=e=>{e.preventDefault();notes.push({id:crypto.randomUUID(),title:$('#noteTitle').value.trim(),text:$('#noteText').value.trim()});store.set('notes',notes);e.target.reset();draw();toast('Notiz gespeichert')};draw()}
$$('.nav button').forEach(b=>b.onclick=()=>render(b.dataset.page));
render('home');
</script>
</body>
</html>
