<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#07110f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VIVAFIX">
<title>VIVAFIX Signature V2</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#07110f;--bg2:#0d1916;--ink:#f6f1e7;--muted:#a5b0aa;
  --line:rgba(255,255,255,.12);--glass:rgba(7,22,19,.57);
  --gold:#efcf8e;--coral:#d97868;--blue:#718be0;--green:#3b9a7b;
  --shadow:0 24px 70px rgba(0,0,0,.34);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:transparent;color:var(--ink)}
body{overflow-x:hidden;background:#06100e}

.world-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;background:#07110f}
.world-bg svg{width:100%;height:100%;display:block;transform:scale(1.025);animation:worldCamera 30s ease-in-out infinite alternate;transform-origin:center;will-change:transform}
.world-bg .mountain-far{animation:farDrift 26s ease-in-out infinite alternate}
.world-bg .mountain-mid{animation:midDrift 19s ease-in-out infinite alternate}
.world-bg .mountain-near{animation:nearDrift 15s ease-in-out infinite alternate}
.world-bg .waterfall-stream{animation:waterfallPulse 2.1s ease-in-out infinite}
.world-bg .waterfall-lines{animation:waterfallLines 1.2s linear infinite}
.world-bg .mist-layer{animation:mistFloat 7s ease-in-out infinite alternate}
.world-bg .lake-ripples{animation:lakeMove 9s linear infinite}
.world-bg .cloud-layer{animation:cloudDrift 34s linear infinite}
@keyframes worldCamera{to{transform:scale(1.045) translate3d(-.6%,.4%,0)}}
@keyframes farDrift{to{transform:translate3d(8px,-3px,0)}}
@keyframes midDrift{to{transform:translate3d(-10px,4px,0)}}
@keyframes nearDrift{to{transform:translate3d(12px,2px,0)}}
@keyframes waterfallPulse{50%{opacity:.88}}
@keyframes waterfallLines{to{transform:translateY(56px)}}
@keyframes mistFloat{to{transform:translateX(75px) scale(1.08);opacity:.75}}
@keyframes lakeMove{to{transform:translate3d(45px,0,0)}}
@keyframes cloudDrift{to{transform:translate3d(100px,0,0)}}
body::after{content:"";position:fixed;inset:0;z-index:1;background:linear-gradient(180deg,rgba(2,12,11,.18),rgba(2,10,9,.35));pointer-events:none}
@keyframes skyDrift{to{transform:translate3d(-2%,1%,0) scale(1.05)}}
@keyframes mountainBack{to{transform:translate3d(2.2%,-1.2%,35px) scale(1.04)}}
@keyframes mountainFront{to{transform:translate3d(-1.8%,1%,75px) scale(1.035)}}
@keyframes waterfallFlow{50%{filter:brightness(1.18) blur(.6px);transform:rotate(2deg) scaleX(1.08)}}
@keyframes waterLines{to{background-position:0 40px}}
@keyframes mist{50%{transform:scale(1.25);opacity:.55}}
@keyframes waterMove{to{background-position:140px 55px,0 0}}
@keyframes fogMove{to{transform:translateX(9%) scale(1.1)}}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
.shell{position:relative;z-index:2;max-width:660px;margin:auto;min-height:100dvh;padding:calc(env(safe-area-inset-top) + 16px) 16px calc(102px + env(safe-area-inset-bottom))}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;font:28px Georgia;color:var(--gold);background:linear-gradient(150deg,#27151a,#0b1714);border:1px solid var(--line);box-shadow:var(--shadow)}
.brand h1{margin:0;font-size:21px;letter-spacing:.18em}
.brand small{display:block;margin-top:4px;font-size:9px;letter-spacing:.2em;color:var(--gold)}
.avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--gold)}
main{min-height:65dvh}
.page-enter{animation:pageIn .46s cubic-bezier(.2,.8,.2,1)}
@keyframes pageIn{from{opacity:0;transform:translateY(15px);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.panel,.item,.tile{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(10px);box-shadow:0 18px 46px rgba(0,0,0,.2)}
.panel{border-radius:28px;padding:19px;margin-bottom:14px}
.hero{position:relative;min-height:390px;overflow:hidden;border-radius:34px;padding:28px;background:linear-gradient(145deg,rgba(8,28,23,.93),rgba(15,19,25,.7));border:1px solid rgba(255,255,255,.13);box-shadow:var(--shadow)}
.hero h2{font:500 46px/.97 Georgia;margin:16px 0 14px;max-width:76%}
.hero p{max-width:72%;margin:0;color:var(--muted);line-height:1.55}
.hero-orb{position:absolute;width:235px;height:235px;right:-28px;bottom:40px;border-radius:50%;background:
radial-gradient(circle at 34% 25%,rgba(255,255,255,.98),rgba(255,255,255,.09) 15%,transparent 22%),
radial-gradient(circle at 40% 40%,#f2d29e 0 9%,#cd796d 28%,#5c6fba 59%,#17332b 80%);
box-shadow:inset -28px -32px 65px rgba(0,0,0,.42),0 38px 85px rgba(0,0,0,.46),0 0 60px rgba(235,176,132,.17);
animation:orbFloat 6s ease-in-out infinite}
@keyframes orbFloat{50%{transform:translateY(-12px) rotate(4deg)}}
.stats{position:absolute;left:22px;right:22px;bottom:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.stat{padding:13px;border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09)}
.stat strong{display:block;font-size:23px;color:var(--gold)}
.stat span{font-size:11px;color:var(--muted)}
.section-head{display:flex;justify-content:space-between;align-items:end;margin:23px 2px 12px}
.section-head h3{margin:0;font:500 24px Georgia}
.section-head button{border:0;background:none;color:var(--gold)}
.bento{display:grid;grid-template-columns:1.12fr .88fr;gap:12px}
.tile{position:relative;min-height:150px;border-radius:26px;padding:20px;text-align:left;color:var(--ink);overflow:hidden;transition:transform .2s ease,border-color .2s}
.tile:active{transform:scale(.985)}
.tile h4{margin:0 0 8px;font:500 24px Georgia}
.tile p{margin:0;max-width:76%;line-height:1.42;color:var(--muted)}
.tile .glyph{position:absolute;right:14px;bottom:7px;font-size:64px;opacity:.13}
.tile.weather{grid-column:1/-1;min-height:128px;background:linear-gradient(135deg,rgba(214,121,87,.3),rgba(76,83,146,.28),rgba(16,44,37,.72))}
.tile.mail{background:linear-gradient(145deg,rgba(71,90,137,.31),rgba(18,26,36,.67))}
.tile.ai{background:linear-gradient(145deg,rgba(115,66,101,.33),rgba(24,23,31,.72))}
.tile.plan{background:linear-gradient(145deg,rgba(43,111,91,.34),rgba(15,28,24,.74))}
.tile.tasks{background:linear-gradient(145deg,rgba(133,100,52,.3),rgba(25,25,21,.72))}
.row{display:flex;gap:9px}.row>*{flex:1}
.input{width:100%;border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.055);color:var(--ink);border-radius:16px;padding:13px;margin:5px 0;outline:none}
.input:focus{border-color:rgba(239,207,142,.65);box-shadow:0 0 0 4px rgba(239,207,142,.07)}
.btn{border:0;border-radius:16px;padding:13px 16px;font-weight:760;color:#15211d;background:linear-gradient(135deg,#f3dba8,#d2aa67);box-shadow:0 13px 28px rgba(184,137,66,.18)}
.btn.secondary{background:rgba(255,255,255,.065);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.full{width:100%}
.list{display:grid;gap:10px}
.empty{text-align:center;padding:26px;color:var(--muted);border:1px dashed var(--line);border-radius:20px}
.item{border-radius:21px;padding:15px}
.item h3{margin:0 0 7px}.item p{margin:0;color:var(--muted);line-height:1.46}
.item footer{display:flex;justify-content:space-between;align-items:center;margin-top:11px;color:var(--gold);font-size:12px}
.item footer button{border:0;background:none;color:var(--muted);font-size:19px}
.mail-toolbar{position:sticky;top:6px;z-index:8;padding:8px 0 10px;background:linear-gradient(to bottom,var(--bg) 55%,transparent)}
.mail-card{display:grid;grid-template-columns:46px 1fr;gap:12px;padding:15px;border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.067),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.09);transition:transform .2s ease,border-color .2s ease}
.mail-card:active{transform:scale(.99)}
.mail-avatar{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;font-weight:800;color:#17211f;background:linear-gradient(135deg,#efd69d,#d58b75)}
.mail-head{display:flex;gap:10px;justify-content:space-between;align-items:flex-start}
.mail-from{font-weight:730;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:74%}
.mail-date{font-size:11px;color:var(--muted);white-space:nowrap}
.mail-subject{margin:5px 0 5px;font-size:16px;font-weight:720}
.mail-snippet{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;color:var(--muted);line-height:1.43}
.mail-count{font-size:12px;color:var(--muted);margin:8px 2px 4px}
.weather-stage{position:relative;min-height:520px;overflow:hidden;border-radius:34px;padding:25px;background:
linear-gradient(180deg,#b55f55 0%,#db8b68 25%,#efbd7c 50%,#7276a2 72%,#152f34 100%);
border:1px solid rgba(255,255,255,.18);box-shadow:var(--shadow);isolation:isolate}
.weather-stage::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(3,20,20,.18));z-index:-1}
.sun{position:absolute;width:150px;height:150px;border-radius:50%;left:50%;top:105px;transform:translateX(-50%);background:radial-gradient(circle,#fff9d3 0 15%,#ffd675 45%,#f39b57 72%);box-shadow:0 0 26px rgba(255,226,142,.88),0 0 75px rgba(255,171,86,.72),0 0 145px rgba(232,103,75,.5);animation:sunBreathe 4.8s ease-in-out infinite}
.sun-rays{position:absolute;width:280px;height:280px;left:50%;top:40px;transform:translateX(-50%);border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(255,230,154,.22) 0 5deg,transparent 5deg 16deg);animation:rays 24s linear infinite;mask-image:radial-gradient(circle,transparent 0 29%,#000 34% 65%,transparent 72%)}
@keyframes sunBreathe{50%{transform:translateX(-50%) scale(1.06);filter:brightness(1.08)}}
@keyframes rays{to{transform:translateX(-50%) rotate(360deg)}}
.horizon{position:absolute;left:-10%;right:-10%;bottom:0;height:225px;background:linear-gradient(180deg,rgba(20,61,58,.2),#102b2b 52%,#071614 100%);clip-path:polygon(0 40%,15% 23%,28% 44%,43% 18%,56% 42%,72% 25%,86% 46%,100% 31%,100% 100%,0 100%)}
.weather-copy{position:relative;z-index:3;text-align:center;margin-top:8px}
.weather-temp{font-size:64px;font-weight:800;letter-spacing:-.05em;margin-top:250px}
.weather-condition{font-size:21px;font-weight:700}
.weather-place,.weather-meta{color:rgba(255,255,255,.8)}
.weather-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:18px}
.weather-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
.weather-metric{padding:12px;border-radius:17px;background:rgba(9,25,25,.28);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(8px)}
.weather-metric strong{display:block;font-size:18px}.weather-metric span{font-size:10px;color:rgba(255,255,255,.76)}
.chat{display:grid;gap:10px;margin-bottom:12px}.bubble{max-width:88%;padding:14px 16px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid var(--line);line-height:1.5}.bubble.me{justify-self:end;background:linear-gradient(135deg,#a66363,#5f6aa1)}
.composer{display:flex;gap:8px}.composer input{flex:1}.chips{display:flex;gap:8px;overflow:auto;padding-bottom:8px}.chips button{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--muted);border-radius:999px;padding:9px 12px}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,660px);height:calc(82px + env(safe-area-inset-bottom));padding:8px 8px env(safe-area-inset-bottom);display:grid;grid-template-columns:repeat(6,1fr);background:rgba(6,13,12,.86);backdrop-filter:blur(28px);border-top:1px solid rgba(255,255,255,.09);z-index:40}
.nav button{border:0;background:none;color:#7f8b85;display:flex;flex-direction:column;align-items:center;gap:4px}.nav b{font-size:20px}.nav small{font-size:9px}.nav .on{color:var(--gold)}
.toast{position:fixed;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translate(-50%,18px);opacity:0;z-index:70;background:#121d19;color:var(--ink);border:1px solid var(--line);padding:11px 15px;border-radius:14px;transition:.25s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}

.weather-search{position:relative;z-index:4;margin-bottom:14px;padding:14px;border-radius:22px;background:rgba(8,24,24,.38);border:1px solid rgba(255,255,255,.17);backdrop-filter:blur(10px)}
.weather-search-row{display:flex;gap:8px}
.weather-search-row .input{margin:0;min-width:0}
.weather-results{display:grid;gap:7px;margin-top:9px}
.weather-result{width:100%;text-align:left;border:1px solid rgba(255,255,255,.13);background:rgba(6,21,21,.54);color:var(--ink);border-radius:14px;padding:10px 12px}
.weather-result strong{display:block}.weather-result span{display:block;margin-top:2px;font-size:11px;color:rgba(255,255,255,.7)}
.weather-source{position:relative;z-index:3;margin-top:10px;text-align:center;font-size:10px;color:rgba(255,255,255,.65)}


.weather-fx{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2}
.weather-stage.rainy{background:linear-gradient(180deg,#2c3747 0%,#3d4a58 35%,#596575 67%,#132a2c 100%)}
.weather-stage.rainy .sun{animation:sunSetAway 1.6s ease forwards}
.weather-stage.rainy .sun-rays{animation:raysFade 1.4s ease forwards}
.weather-stage.stormy{background:linear-gradient(180deg,#171d2a,#303b49 47%,#102526 100%)}
.weather-stage.stormy .sun,.weather-stage.stormy .sun-rays{opacity:0;transform:translate(-50%,180px) scale(.6)}
.weather-stage.snowy{background:linear-gradient(180deg,#71879a,#b4c7d2 53%,#526c75 76%,#183133)}
.rain-drop{position:absolute;top:-80px;width:2px;height:70px;background:linear-gradient(transparent,rgba(220,244,255,.78));border-radius:999px;animation:rainFall linear infinite;transform:rotate(10deg)}
.snow-flake{position:absolute;top:-30px;color:#fff;opacity:.88;animation:snowFall linear infinite;text-shadow:0 0 8px rgba(255,255,255,.5)}
.weather-cloud{position:absolute;width:210px;height:62px;border-radius:999px;background:rgba(42,51,61,.86);filter:blur(2px);box-shadow:70px 18px 0 12px rgba(42,51,61,.82),-55px 20px 0 5px rgba(42,51,61,.74);animation:weatherCloud 13s linear infinite}
.weather-cloud.c2{top:130px;left:-20px;transform:scale(.78);animation-duration:18s;opacity:.8}
.weather-cloud.c1{top:82px;left:-260px}
.lightning{position:absolute;inset:0;background:white;opacity:0;animation:lightningFlash 6s steps(1) infinite}
@keyframes sunSetAway{to{opacity:0;transform:translate(-50%,230px) scale(.55)}}
@keyframes raysFade{to{opacity:0;transform:translateX(-50%) scale(.6)}}
@keyframes rainFall{to{transform:translate(90px,900px) rotate(10deg)}}
@keyframes snowFall{to{transform:translate(65px,850px) rotate(360deg)}}
@keyframes weatherCloud{to{transform:translateX(980px)}}
@keyframes lightningFlash{0%,88%,92%,100%{opacity:0}89%,91%{opacity:.65}}
.mail-toolbar{position:relative!important;top:auto!important;z-index:3!important;padding:0 0 10px!important;background:none!important}
.mail-card{cursor:pointer}
.mail-detail{position:fixed;inset:0;z-index:85;background:rgba(4,13,12,.93);backdrop-filter:blur(12px);overflow:auto;padding:calc(env(safe-area-inset-top) + 18px) 16px calc(30px + env(safe-area-inset-bottom));animation:detailIn .36s ease}
.mail-detail-inner{max-width:660px;margin:auto}
.mail-detail-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.mail-detail-head button{width:44px;height:44px;border-radius:15px;border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--ink);font-size:23px}
.mail-detail-card{border-radius:27px;padding:20px;background:rgba(10,29,25,.74);border:1px solid var(--line)}
.mail-detail-card h2{font:500 29px/1.15 Georgia;margin:11px 0}
.mail-body{white-space:pre-wrap;overflow-wrap:anywhere;color:#d9dfdb;line-height:1.58;margin-top:18px}
.attachment-chip{display:inline-block;margin:8px 6px 0 0;padding:8px 11px;border-radius:999px;background:rgba(239,207,142,.12);color:var(--gold);border:1px solid rgba(239,207,142,.18);font-size:12px}
@keyframes detailIn{from{opacity:0;transform:translateY(18px)}}

/* ===== RESTORED PREMIUM PLAN + TASKS ===== */
.plan-shell,.tasks-shell{
  position:relative;overflow:hidden;border-radius:32px;padding:23px;
  border:1px solid rgba(255,255,255,.15);
  background:linear-gradient(145deg,rgba(8,31,25,.68),rgba(11,20,20,.48));
  backdrop-filter:blur(10px);
  box-shadow:0 25px 65px rgba(0,0,0,.28);
}
.plan-shell::before,.tasks-shell::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.055),transparent 36%);
}
.plan-accent,.tasks-accent{
  position:absolute;left:0;top:0;bottom:0;width:5px;
  background:linear-gradient(180deg,var(--gold),var(--coral),var(--green));
  box-shadow:0 0 24px rgba(239,207,142,.34);
}
.plan-top,.tasks-top{position:relative;z-index:1;margin-bottom:20px}
.plan-top h2,.tasks-top h2{margin:13px 0 9px;font:500 35px/1.04 Georgia}
.plan-top p,.tasks-top p{margin:0;color:var(--muted);line-height:1.5}
.plan-grid,.tasks-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;position:relative;z-index:1}
.field-block{min-width:0}
.field-block.full{grid-column:1/-1}
.field-block label{display:block;margin:0 4px 5px;color:var(--gold);font-size:10px;letter-spacing:.13em;text-transform:uppercase}
.plan-shell .input,.tasks-shell .input{
  margin:0;background:rgba(255,255,255,.065);border-color:rgba(255,255,255,.14);
  min-height:54px;transition:transform .2s ease,border-color .2s ease,background .2s ease;
}
.plan-shell .input:focus,.tasks-shell .input:focus{transform:translateY(-1px);background:rgba(255,255,255,.085)}
.save-row{display:flex;align-items:center;gap:12px;margin-top:15px;position:relative;z-index:1}
.save-row .btn{flex:1;min-height:54px}
.mini-badge{
  width:54px;height:54px;border-radius:17px;display:grid;place-items:center;
  background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);
  color:var(--gold);font-size:22px;box-shadow:inset 0 1px rgba(255,255,255,.08)
}
.task-progress{position:relative;z-index:1;display:flex;align-items:center;gap:14px;margin:17px 0 20px;padding:13px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}
.task-progress strong{display:block}.task-progress span{display:block;margin-top:4px;color:var(--muted);font-size:12px}
.progress-ring{
  --p:0;width:65px;height:65px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;
  background:conic-gradient(var(--gold) calc(var(--p)*1%),rgba(255,255,255,.09) 0);
  position:relative
}
.progress-ring::before{content:"";position:absolute;inset:7px;border-radius:50%;background:#10221d}
.progress-ring::after{content:attr(data-label);position:relative;font-size:12px;font-weight:800;color:var(--gold)}
.timeline{position:relative;padding-left:18px}
.timeline::before{content:"";position:absolute;left:5px;top:7px;bottom:7px;width:1px;background:linear-gradient(var(--gold),rgba(255,255,255,.08))}
.timeline .item{position:relative;margin-left:10px}
.timeline .item::before{content:"";position:absolute;left:-25px;top:22px;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 17px rgba(239,207,142,.65)}
.task-item{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center}
.task-check{
  width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
  color:#15211d;background:linear-gradient(135deg,#f3dba8,#d2aa67);font-weight:900
}
.task-main{min-width:0}.task-main h3{overflow:hidden;text-overflow:ellipsis}
.delete-x{border:0;background:none;color:var(--muted);font-size:23px}
.priority-pill{display:inline-block;padding:3px 8px;border-radius:999px;background:rgba(239,207,142,.13);color:var(--gold);font-size:11px}
.priority-pill.high{background:rgba(217,120,104,.15);color:#efa18f}
.priority-pill.low{background:rgba(59,154,123,.14);color:#76c8ab}
.swoosh-layer{
  position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;
  background:linear-gradient(110deg,transparent 0 34%,rgba(255,255,255,.12) 43%,rgba(239,207,142,.27) 49%,rgba(255,255,255,.06) 55%,transparent 66%);
  transform:translateX(-115%) skewX(-12deg)
}
.swoosh-layer.play{animation:swoosh .72s cubic-bezier(.2,.8,.2,1)}
@keyframes swoosh{0%{opacity:0;transform:translateX(-115%) skewX(-12deg)}35%{opacity:1}100%{opacity:0;transform:translateX(115%) skewX(-12deg)}}


.low-power .world-bg .cloud-layer,
.low-power .world-bg .mist-layer,

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const today=()=>new Date().toISOString().slice(0,10);
let accessToken='', tokenClient=null, gmailMessages=[], gmailNextPageToken='', gmailLoading=false, weatherData=null, weatherLocation=null;
const store={get:(k,d=[])=>{try{return JSON.parse(localStorage.getItem('vf_'+k))??d}catch{return d}},set:(k,v)=>localStorage.setItem('vf_'+k,JSON.stringify(v))};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function decodeEntities(s=''){const t=document.createElement('textarea');t.innerHTML=s;return t.value}

let audioCtx=null;

let audioReady=false;
function warmAudio(){
  if(audioReady)return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    audioReady=true;
  }catch{}
}
document.addEventListener('touchstart',warmAudio,{once:true,passive:true});
document.addEventListener('pointerdown',warmAudio,{once:true,passive:true});

function clickSound(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
    o.type='sine';o.frequency.setValueAtTime(520,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(290,audioCtx.currentTime+.035);
    f.type='lowpass';f.frequency.value=1400;
    g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.055,audioCtx.currentTime+.006);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.05);
    o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.055);
  }catch{}
}
function toast(t){const x=$('#toast');x.textContent=t;x.classList.add('show');clearTimeout(x._t);x._t=setTimeout(()=>x.classList.remove('show'),1600)}
function shortSender(v=''){return v.replace(/<[^>]+>/g,'').replace(/"/g,'').trim()||'Unbekannt'}
function initial(v=''){return shortSender(v).charAt(0).toUpperCase()||'M'}
function formatMailDate(v=''){const d=new Date(v);if(Number.isNaN(d.getTime()))return '';const now=new Date();return d.toDateString()===now.toDateString()?d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}
function weatherText(code){if(code===0)return['☀️','Klar'];if(code<=3)return['⛅','Leicht bewölkt'];if(code<=48)return['🌫️','Nebel'];if(code<=57)return['🌦️','Nieselregen'];if(code<=67)return['🌧️','Regen'];if(code<=77)return['🌨️','Schnee'];if(code<=82)return['🌦️','Schauer'];if(code<=86)return['🌨️','Schneeschauer'];if(code>=95)return['⛈️','Gewitter'];return['🌤️','Wetter']}
try{weatherData=JSON.parse(localStorage.getItem('vf_weather'));weatherLocation=JSON.parse(localStorage.getItem('vf_weather_location'))}catch{}

const templates={
home:()=>{const tasks=store.get('tasks'),events=store.get('events'),open=tasks.filter(x=>!x.done),tod=events.filter(x=>x.date===today());const weatherLabel=weatherData?Math.round(weatherData.current.temperature_2m)+'° · '+weatherText(weatherData.current.weather_code)[1]:'Sunset-Wetter öffnen';return `
<section class="hero">
<div class="eyebrow">Dein Tag. Neu gedacht.</div><h2>Alles fließt zusammen.</h2>
<p>Aufgaben, Termine, E-Mails, Wetter und intelligente Unterstützung in einem ruhigen digitalen Raum.</p>
<div class="hero-orb"></div>
<div class="stats"><div class="stat"><strong>${open.length}</strong><span>Aufgaben</span></div><div class="stat"><strong>${tod.length}</strong><span>Termine heute</span></div><div class="stat"><strong>${gmailMessages.length}</strong><span>E-Mails geladen</span></div></div>
</section>
<div class="section-head"><h3>Dein Raum</h3></div>
<section class="bento">
<button class="tile weather" data-jump="weather"><h4>Wetter</h4><p>${esc(weatherLabel)} · animierte Sunset-Ansicht</p><span class="glyph">☀</span></button>
<button class="tile ai" data-jump="ai"><h4>VIVAFIX AI</h4><p>Frag, plane und organisiere deinen Tag.</p><span class="glyph">✦</span></button>
<button class="tile mail" data-jump="mail"><h4>Mail</h4><p>Ruhig, sortiert und mit mehr Nachrichten.</p><span class="glyph">✉</span></button>
<button class="tile plan" data-jump="calendar"><h4>Plan</h4><p>Termine als klare Timeline.</p><span class="glyph">□</span></button>
<button class="tile tasks" data-jump="tasks"><h4>Aufgaben</h4><p>Fokus ohne Ablenkung.</p><span class="glyph">✓</span></button>
</section>`},
weather:()=>weatherTemplate(),
mail:()=>`<section class="panel"><div class="eyebrow">Inbox</div><h2>Dein Posteingang</h2><p style="color:var(--muted)">Google Gmail bleibt verbunden. Du kannst jetzt schrittweise deutlich mehr als 15 Nachrichten laden.</p><div class="row"><button id="connectGmail" class="btn">Gmail verbinden</button><button id="refreshGmail" class="btn secondary">Neu laden</button></div></section><div class="mail-toolbar"><input id="mailSearch" class="input" placeholder="Absender, Betreff oder Text durchsuchen…"><div id="mailCount" class="mail-count"></div></div><section id="mailList" class="list"></section><div id="mailMoreWrap" style="margin-top:12px"></div>`,
ai:()=>`<section class="panel"><div class="eyebrow">VIVAFIX Intelligence</div><h2>Was möchtest du heute ordnen?</h2></section><div class="chips"><button data-prompt="Was steht heute an?">Heute</button><button data-prompt="Zeig offene Aufgaben">Aufgaben</button><button data-prompt="Wie ist das Wetter?">Wetter</button><button data-prompt="Fasse meine Notizen zusammen">Notizen</button></div><section id="chat" class="chat"></section><form id="chatForm" class="composer"><input id="chatInput" class="input" placeholder="Frag VIVAFIX…"><button class="btn">↑</button></form>`,
calendar:()=>`<section class="plan-shell">
<div class="plan-accent"></div>
<div class="plan-top"><div class="eyebrow">Zeit gestalten</div><h2>Dein nächster Moment.</h2><p>Plane Termine als ruhige, klare Timeline – mit Tiefe und Bewegung.</p></div>
<form id="eventForm">
<div class="plan-grid">
<div class="field-block full"><label>Titel</label><input id="eventTitle" class="input" placeholder="z. B. Projektbesprechung" required></div>
<div class="field-block"><label>Datum</label><input id="eventDate" class="input" type="date" value="${today()}" required></div>
<div class="field-block"><label>Uhrzeit</label><input id="eventTime" class="input" type="time" value="10:00" required></div>
</div>
<div class="save-row"><button class="btn">Termin speichern</button><div class="mini-badge">↗</div></div>
</form></section>
<div class="section-head"><h3>Deine Timeline</h3><button type="button">Heute</button></div>
<section id="eventList" class="list timeline"></section>`,
tasks:()=>{const a=store.get('tasks'),done=a.filter(x=>x.done).length,p=a.length?Math.round(done/a.length*100):0;return `<section class="tasks-shell">
<div class="tasks-accent"></div>
<div class="tasks-top"><div class="eyebrow">Fokus</div><h2>Was zählt jetzt?</h2><p>Aufgaben bekommen Gewicht, Rhythmus und einen klaren Abschluss.</p></div>
<div class="task-progress"><div class="progress-ring" style="--p:${p}" data-label="${p}%"></div><div><strong>${done} von ${a.length} erledigt</strong><span>Dein Fortschritt heute</span></div></div>
<form id="taskForm">
<div class="tasks-grid">
<div class="field-block full"><label>Aufgabe</label><input id="taskTitle" class="input" placeholder="z. B. Angebot prüfen" required></div>
<div class="field-block"><label>Datum</label><input id="taskDate" class="input" type="date" value="${today()}"></div>
<div class="field-block"><label>Priorität</label><select id="taskPriority" class="input"><option>hoch</option><option selected>mittel</option><option>niedrig</option></select></div>
</div>
<div class="save-row"><button class="btn">Aufgabe speichern</button><div class="mini-badge">✓</div></div>
</form></section>
<div class="section-head"><h3>Dein Fokus</h3><button type="button">Sortieren</button></div>
<section id="taskList" class="list"></section>`},
more:()=>`<section class="panel"><div class="eyebrow">Verbindung</div><h2>Gmail</h2><input id="clientId" class="input" placeholder="…apps.googleusercontent.com" value="${esc(localStorage.getItem('gmailClientId')||'')}"><button id="saveClient" class="btn">Client-ID speichern</button></section><section class="panel"><div class="eyebrow">Gedanken</div><h2>Notizen</h2><form id="noteForm"><input id="noteTitle" class="input" placeholder="Titel" required><textarea id="noteText" class="input" rows="4" placeholder="Notiz" required></textarea><button class="btn">Notiz speichern</button></form></section><section id="noteList" class="list"></section>`
};
function playSwoosh(){const s=$('#swooshLayer');if(!s)return;s.classList.remove('play');void s.offsetWidth;s.classList.add('play')}
function render(page){
 if(page==='calendar'||page==='tasks')playSwoosh();
 document.body.dataset.page=page;
 const v=$('#view');v.innerHTML=(templates[page]||templates.home)();v.classList.remove('page-enter');requestAnimationFrame(()=>v.classList.add('page-enter'));
 
function enableLowPowerMode(){
  document.documentElement.classList.add('low-power');
}
(function detectPerformance(){
  let frames=0,start=performance.now();
  function tick(now){
    frames++;
    if(now-start<1200){requestAnimationFrame(tick);return}
    const fps=frames/((now-start)/1000);
    if(fps<45)enableLowPowerMode();
  }
  requestAnimationFrame(tick);
})();

$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page===page));
 $$('[data-jump]').forEach(b=>b.onclick=()=>{clickSound();render(b.dataset.jump)});
 if(page==='weather')weatherPage();
 if(page==='mail')mail();
 if(page==='ai')chat();
 if(page==='calendar')calendar();
 if(page==='tasks')tasks();
 if(page==='more')more();
 scrollTo(0,0);
}


function weatherEffect(code){
 let cls='',html='';
 const rain=code>=51&&code<=82,storm=code>=95,snow=code>=71&&code<=86;
 if(storm){cls='stormy';html='<div class="weather-cloud c1"></div><div class="weather-cloud c2"></div><div class="lightning"></div>'+makeRain(30)}
 else if(snow){cls='snowy';html='<div class="weather-cloud c1"></div>'+makeSnow(22)}
 else if(rain){cls='rainy';html='<div class="weather-cloud c1"></div><div class="weather-cloud c2"></div>'+makeRain(26)}
 return{cls,html};
}
function makeRain(n){return Array.from({length:n},(_,i)=>`<i class="rain-drop" style="left:${(i*37)%105}%;animation-duration:${.62+(i%7)*.08}s;animation-delay:${-(i%13)*.11}s;opacity:${.35+(i%5)*.1}"></i>`).join('')}
function makeSnow(n){return Array.from({length:n},(_,i)=>`<i class="snow-flake" style="left:${(i*41)%103}%;font-size:${9+(i%6)*3}px;animation-duration:${4.8+(i%8)*.55}s;animation-delay:${-(i%12)*.42}s">❄</i>`).join('')}

function weatherTemplate(){
 const search=`<div class="weather-search"><div class="weather-search-row"><input id="weatherQuery" class="input" placeholder="Stadt, Land oder Postleitzahl eingeben…"><button id="weatherSearchBtn" class="btn">Suchen</button></div><div id="weatherResults" class="weather-results"></div></div>`;
 if(!weatherData)return `<section class="weather-stage ${fx.cls}">${search}<div class="weather-fx">${fx.html}</div><div class="sun-rays"></div><div class="sun"></div><div class="horizon"></div><div class="weather-copy"><div class="eyebrow">Sunset Weather</div><div class="weather-temp">—°</div><div class="weather-condition">Ort auswählen</div><div class="weather-place">Suche weltweit nach einer Stadt oder verwende deinen Standort.</div><div class="weather-actions"><button id="weatherBack" class="btn secondary">Zurück</button><button id="loadWeather" class="btn">Mein Standort</button></div><div class="weather-source">Wetter- und Ortsdaten: Open-Meteo</div></div></section>`;
 const w=weatherData.current,[icon,label]=weatherText(w.weather_code),fx=weatherEffect(w.weather_code);
 const place=weatherLocation?.name?[weatherLocation.name,weatherLocation.admin1,weatherLocation.country].filter(Boolean).join(', '):'Dein aktueller Standort';
 return `<section class="weather-stage ${fx.cls}">${search}<div class="weather-fx">${fx.html}</div><div class="sun-rays"></div><div class="sun"></div><div class="horizon"></div><div class="weather-copy"><div class="eyebrow">Sunset Weather</div><div class="weather-temp">${Math.round(w.temperature_2m)}°</div><div class="weather-condition">${icon} ${label}</div><div class="weather-place">${esc(place)}</div><div class="weather-metrics"><div class="weather-metric"><strong>${Math.round(w.apparent_temperature)}°</strong><span>Gefühlt</span></div><div class="weather-metric"><strong>${Math.round(w.wind_speed_10m)}</strong><span>km/h Wind</span></div><div class="weather-metric"><strong>${new Date(w.time).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</strong><span>Stand</span></div></div><div class="weather-actions"><button id="weatherBack" class="btn secondary">Zurück</button><button id="loadWeather" class="btn">Mein Standort</button></div><div class="weather-source">Wetter- und Ortsdaten: Open-Meteo</div></div></section>`;
}
function weatherPage(){
 $('#weatherBack').onclick=()=>render('home');
 $('#loadWeather').onclick=loadWeather;
 $('#weatherSearchBtn').onclick=searchWeatherLocation;
 $('#weatherQuery').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();searchWeatherLocation()}});
}
async function searchWeatherLocation(){
 const input=$('#weatherQuery'),box=$('#weatherResults'),q=input.value.trim();
 if(q.length<2){toast('Bitte mindestens 2 Zeichen eingeben');return}
 box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Orte werden gesucht…</div>';
 try{
   const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=de&format=json`);
   if(!r.ok)throw new Error();
   const d=await r.json(),results=d.results||[];
   if(!results.length){box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Kein passender Ort gefunden.</div>';return}
   box.innerHTML=results.map((x,i)=>`<button class="weather-result" data-weather-result="${i}"><strong>${esc(x.name)}</strong><span>${esc([x.admin1,x.country].filter(Boolean).join(', '))}</span></button>`).join('');
   $$('[data-weather-result]').forEach(b=>b.onclick=()=>{const x=results[Number(b.dataset.weatherResult)];loadWeatherCoords(x.latitude,x.longitude,{name:x.name,admin1:x.admin1||'',country:x.country||'',timezone:x.timezone||''})});
 }catch{box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Ortssuche ist gerade nicht verfügbar.</div>'}
}
async function loadWeatherCoords(latitude,longitude,location){
 toast('Wetter wird geladen…');
 try{
   const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`);
   if(!r.ok)throw new Error();
   weatherData=await r.json();weatherLocation=location||null;
   localStorage.setItem('vf_weather',JSON.stringify(weatherData));
   localStorage.setItem('vf_weather_location',JSON.stringify(weatherLocation));
   render('weather');toast('Wetter aktualisiert');
 }catch{toast('Wetter konnte nicht geladen werden')}
}
function loadWeather(){
 if(!navigator.geolocation)return toast('Standort wird nicht unterstützt');
 toast('Standort wird ermittelt…');
 navigator.geolocation.getCurrentPosition(
   p=>loadWeatherCoords(p.coords.latitude,p.coords.longitude,{name:'Aktueller Standort',admin1:'',country:''}),
   ()=>toast('Standortzugriff wurde nicht erlaubt'),
   {timeout:10000,maximumAge:600000}
 );
}
function tasks(){
 let a=store.get('tasks');
 const draw=()=>{
   const done=a.filter(x=>x.done).length,p=a.length?Math.round(done/a.length*100):0;
   const ring=document.querySelector('.progress-ring');if(ring){ring.style.setProperty('--p',p);ring.dataset.label=p+'%'}
   const txt=document.querySelector('.task-progress strong');if(txt)txt.textContent=`${done} von ${a.length} erledigt`;
   $('#taskList').innerHTML=a.length?a.map(t=>`<article class="item task-item"><button class="task-check" data-toggle="${t.id}">${t.done?'✓':''}</button><div class="task-main"><h3>${esc(t.title)}</h3><p>${t.date||'Ohne Datum'} · <span class="priority-pill ${t.priority==='hoch'?'high':t.priority==='niedrig'?'low':''}">${esc(t.priority)}</span></p></div><button class="delete-x" data-del="${t.id}">×</button></article>`).join(''):'<div class="empty">Noch keine Aufgaben.</div>';
   $$('[data-toggle]').forEach(b=>b.onclick=()=>{const t=a.find(x=>x.id===b.dataset.toggle);t.done=!t.done;store.set('tasks',a);draw()});
   $$('[data-del]').forEach(b=>b.onclick=()=>{a=a.filter(x=>x.id!==b.dataset.del);store.set('tasks',a);draw()});
 };
 $('#taskForm').onsubmit=e=>{e.preventDefault();a.push({id:crypto.randomUUID(),title:$('#taskTitle').value.trim(),date:$('#taskDate').value,priority:$('#taskPriority').value,done:false});store.set('tasks',a);e.target.reset();draw();toast('Aufgabe gespeichert')};
 draw();
}
function calendar(){let a=store.get('events');const draw=()=>{$('#eventList').innerHTML=a.length?a.sort((x,y)=>(x.date+x.time).localeCompare(y.date+y.time)).map(ev=>`<article class="item"><h3>${esc(ev.title)}</h3><p>${ev.date} · ${ev.time} Uhr</p><footer><span>Termin</span><button data-del="${ev.id}">×</button></footer></article>`).join(''):'<div class="empty">Noch keine Termine.</div>';$$('[data-del]').forEach(b=>b.onclick=()=>{a=a.filter(x=>x.id!==b.dataset.del);store.set('events',a);draw()})};$('#eventForm').onsubmit=e=>{e.preventDefault();a.push({id:crypto.randomUUID(),title:$('#eventTitle').value.trim(),date:$('#eventDate').value,time:$('#eventTime').value});store.set('events',a);e.target.reset();draw();toast('Termin gespeichert')};draw()}
function assistant(q){const l=q.toLowerCase(),tasks=store.get('tasks'),events=store.get('events'),notes=store.get('notes'),open=tasks.filter(t=>!t.done);if(/wetter/.test(l)){if(!weatherData)return 'Öffne auf Start die Wetter-App und erlaube deinen Standort.';const w=weatherData.current,[,label]=weatherText(w.weather_code);return `Aktuell ${Math.round(w.temperature_2m)} Grad, ${label.toLowerCase()}, gefühlt ${Math.round(w.apparent_temperature)} Grad.`}if(/heute|steht.*an/.test(l))return `Heute hast du ${open.filter(t=>t.date===today()).length} offene Aufgaben und ${events.filter(e=>e.date===today()).length} Termine.`;if(/aufgaben|offen/.test(l))return open.length?`Offene Aufgaben: ${open.map(x=>x.title).join(', ')}`:'Keine offenen Aufgaben.';if(/notiz/.test(l))return notes.length?`Du hast ${notes.length} Notizen: ${notes.slice(-3).map(n=>n.title).join(', ')}`:'Noch keine Notizen.';return 'Ich kann Aufgaben, Termine, Notizen, Gmail und Wetter auswerten.'}
function chat(){let h=store.get('chat',[{role:'ai',text:'Hallo. Ich bin VIVAFIX. Was möchtest du heute ordnen?'}]);const draw=()=>$('#chat').innerHTML=h.map(x=>`<div class="bubble ${x.role==='me'?'me':''}">${esc(x.text)}</div>`).join('');const send=q=>{if(!q.trim())return;h.push({role:'me',text:q.trim()});h.push({role:'ai',text:assistant(q)});store.set('chat',h);draw()};draw();$('#chatForm').onsubmit=e=>{e.preventDefault();send($('#chatInput').value);$('#chatInput').value=''};$$('[data-prompt]').forEach(b=>b.onclick=()=>send(b.dataset.prompt))}
function initGoogle(){const id=localStorage.getItem('gmailClientId');if(!id||!window.google?.accounts?.oauth2)return false;tokenClient=google.accounts.oauth2.initTokenClient({client_id:id,scope:'https://www.googleapis.com/auth/gmail.readonly',callback:r=>{if(r.error)return alert('Google-Anmeldung fehlgeschlagen: '+r.error);accessToken=r.access_token;gmailMessages=[];gmailNextPageToken='';render('mail');loadGmail(false)}});return true}
async function gmailFetch(path){const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/'+path,{headers:{Authorization:'Bearer '+accessToken}}),d=await r.json();if(!r.ok)throw new Error(d.error?.message||'Gmail-Fehler');return d}
async function loadGmail(append=false){
 if(gmailLoading)return;
 const list=$('#mailList');
 if(!accessToken){list.innerHTML='<div class="empty">Verbinde zuerst dein Gmail-Konto.</div>';drawMailControls();return}
 gmailLoading=true;
 if(!append)list.innerHTML='<div class="panel">E-Mails werden geladen…</div>';
 try{
   const token=append&&gmailNextPageToken?'&pageToken='+encodeURIComponent(gmailNextPageToken):'';
   const r=await gmailFetch('messages?maxResults=25&q=in%3Ainbox'+token);
   const batch=await Promise.all((r.messages||[]).map(async x=>{
     const m=await gmailFetch(`messages/${x.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`);
     const hs=m.payload?.headers||[],h=n=>hs.find(z=>z.name.toLowerCase()===n.toLowerCase())?.value||'';
     return{id:x.id,from:decodeEntities(h('From')),subject:decodeEntities(h('Subject')||'(Kein Betreff)'),date:h('Date'),snippet:decodeEntities(m.snippet||'')};
   }));
   gmailMessages=append?[...gmailMessages,...batch]:batch;
   gmailNextPageToken=r.nextPageToken||'';
   drawMail(gmailMessages);
 }catch(e){list.innerHTML=`<div class="panel">${esc(e.message)}</div>`}
 finally{gmailLoading=false;drawMailControls()}
}
function drawMail(a){
 const list=$('#mailList');
 list.innerHTML=a.length?a.map(m=>`<article class="mail-card" data-mail-id="${m.id}" role="button"><div class="mail-avatar">${esc(initial(m.from))}</div><div><div class="mail-head"><div class="mail-from">${esc(shortSender(m.from))}</div><div class="mail-date">${esc(formatMailDate(m.date))}</div></div><div class="mail-subject">${esc(m.subject)}</div><div class="mail-snippet">${esc(m.snippet)}</div></div></article>`).join(''):'<div class="empty">Keine E-Mails gefunden.</div>';
 const count=$('#mailCount');if(count)count.textContent=`${a.length} E-Mails angezeigt`;
 $$('[data-mail-id]').forEach(card=>card.onclick=()=>{clickSound();openMail(card.dataset.mailId)});
}
function decodeBase64Url(v=''){try{const s=v.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(s)))}catch{return''}}
function collectParts(part,out={texts:[],htmls:[],attachments:[]}){
 if(!part)return out;
 if(part.filename)out.attachments.push(part.filename);
 const data=part.body?.data;
 if(data){
   const decoded=decodeBase64Url(data);
   if(part.mimeType==='text/plain')out.texts.push(decoded);
   if(part.mimeType==='text/html')out.htmls.push(decoded);
 }
 (part.parts||[]).forEach(p=>collectParts(p,out));return out;
}
function htmlToText(html=''){const d=document.createElement('div');d.innerHTML=html;return d.innerText||d.textContent||''}
async function openMail(id){
 const overlay=document.createElement('section');overlay.className='mail-detail';overlay.innerHTML='<div class="mail-detail-inner"><div class="panel">E-Mail wird geladen…</div></div>';document.body.appendChild(overlay);
 try{
   const m=await gmailFetch(`messages/${id}?format=full`);
   const hs=m.payload?.headers||[],h=n=>hs.find(z=>z.name.toLowerCase()===n.toLowerCase())?.value||'';
   const parts=collectParts(m.payload),body=(parts.texts.join('\n').trim()||htmlToText(parts.htmls.join('\n')).trim()||decodeEntities(m.snippet||''));
   overlay.innerHTML=`<div class="mail-detail-inner"><div class="mail-detail-head"><button id="closeMail">‹</button><div><div class="eyebrow">E-Mail</div><strong>${esc(shortSender(h('From')))}</strong></div></div><article class="mail-detail-card"><div style="color:var(--muted)">${esc(h('Date'))}</div><h2>${esc(decodeEntities(h('Subject')||'(Kein Betreff)'))}</h2><div style="color:var(--muted);overflow-wrap:anywhere">${esc(h('From'))}</div>${parts.attachments.length?`<div>${parts.attachments.map(x=>`<span class="attachment-chip">📎 ${esc(x)}</span>`).join('')}</div>`:''}<div class="mail-body">${esc(body)}</div></article></div>`;
   $('#closeMail').onclick=()=>{clickSound();overlay.remove()};
 }catch(e){overlay.innerHTML=`<div class="mail-detail-inner"><button id="closeMail" class="btn secondary">Zurück</button><div class="panel">${esc(e.message)}</div></div>`;$('#closeMail').onclick=()=>overlay.remove()}
}
function drawMailControls(){
 const wrap=$('#mailMoreWrap');if(!wrap)return;
 wrap.innerHTML=gmailNextPageToken?`<button id="loadMoreMail" class="btn secondary full">${gmailLoading?'Wird geladen…':'Weitere 25 E-Mails laden'}</button>`:'';
 if($('#loadMoreMail'))$('#loadMoreMail').onclick=()=>loadGmail(true);
}
function mail(){
 $('#connectGmail').onclick=()=>{if(!localStorage.getItem('gmailClientId')){toast('Client-ID zuerst unter Mehr speichern');render('more');return}if(!initGoogle())return alert('Google-Anmeldung lädt noch.');tokenClient.requestAccessToken({prompt:'consent'})};
 $('#refreshGmail').onclick=()=>{gmailMessages=[];gmailNextPageToken='';loadGmail(false)};
 $('#mailSearch').oninput=e=>{const q=e.target.value.toLowerCase();drawMail(gmailMessages.filter(m=>(m.from+' '+m.subject+' '+m.snippet).toLowerCase().includes(q)))};
 if(gmailMessages.length)drawMail(gmailMessages);else loadGmail(false);
 drawMailControls();
}
function more(){
 $('#saveClient').onclick=()=>{const id=$('#clientId').value.trim();if(!id.endsWith('.apps.googleusercontent.com'))return alert('Ungültige Client-ID.');localStorage.setItem('gmailClientId',id);toast('Client-ID gespeichert')};
 let notes=store.get('notes');const draw=()=>{$('#noteList').innerHTML=notes.length?notes.slice().reverse().map(n=>`<article class="item"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><footer><span>Notiz</span><button data-del="${n.id}">×</button></footer></article>`).join(''):'<div class="empty">Noch keine Notizen.</div>';$$('[data-del]').forEach(b=>b.onclick=()=>{notes=notes.filter(n=>n.id!==b.dataset.del);store.set('notes',notes);draw()})};$('#noteForm').onsubmit=e=>{e.preventDefault();notes.push({id:crypto.randomUUID(),title:$('#noteTitle').value.trim(),text:$('#noteText').value.trim()});store.set('notes',notes);e.target.reset();draw();toast('Notiz gespeichert')};draw()
}
$$('.nav button').forEach(b=>b.onclick=()=>{clickSound();render(b.dataset.page)});
render('home');
</script>
</body>
</html>
