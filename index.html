<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050609" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VIVAFIX" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <title>VIVAFIX</title>
  <style>
:root{
  --bg:#050609;--panel:#0d1016;--panel2:#121620;--gold:#f2b35f;
  --rose:#ff6f9f;--peach:#ff9b78;--text:#fff;--muted:#8f98a8;--line:rgba(245,184,105,.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}
body{background:
radial-gradient(circle at 90% 7%,rgba(255,111,159,.10),transparent 25%),
radial-gradient(circle at 5% 35%,rgba(242,179,95,.07),transparent 30%),var(--bg)}
button,input{font:inherit}.hidden{display:none!important}
.app{max-width:560px;margin:auto;min-height:100dvh;padding:calc(env(safe-area-inset-top) + 18px) 18px calc(105px + env(safe-area-inset-bottom))}
.splash{position:fixed;inset:0;z-index:99;background:#030407;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .55s ease}
.splash.hide{opacity:0;pointer-events:none}
.brand-core{width:190px;height:190px;position:relative;display:grid;place-items:center}
.brand-core .ring{position:absolute;inset:8px;border:1px solid rgba(242,179,95,.35);clip-path:polygon(50% 0,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);animation:spin 7s linear infinite}
.brand-core .ring.r2{inset:27px;border-color:rgba(255,111,159,.48);animation-direction:reverse;animation-duration:5s}
.brand-logo{width:130px;filter:drop-shadow(0 0 20px rgba(255,111,159,.35));animation:breathe 1.8s ease-in-out infinite}
.splash h1{letter-spacing:.38em;font-size:24px;margin:22px 0 8px;background:linear-gradient(90deg,var(--gold),#ffe1ae,var(--rose));-webkit-background-clip:text;color:transparent}
.splash p{color:#9ca5b5;margin:0 0 25px}.loader{height:3px;width:220px;background:#1b1317;border-radius:9px;overflow:hidden}.loader i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--gold),var(--rose));animation:load 2.4s ease forwards}
.splash small{color:#6f7888;margin-top:10px}
@keyframes load{to{width:100%}}@keyframes breathe{50%{transform:scale(1.06)}}@keyframes spin{to{transform:rotate(360deg)}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin:4px 0 22px}.greeting{display:flex;align-items:center;gap:12px}
.mini-logo{width:48px;height:48px;border-radius:15px;object-fit:cover;box-shadow:0 0 20px rgba(255,111,159,.16)}
.eyebrow{margin:0;color:var(--gold);font-size:12px;letter-spacing:.08em}.topbar h1{font-size:28px;margin:3px 0 0}.bell{width:45px;height:45px;border:1px solid var(--line);background:#0d1016;border-radius:50%;color:var(--gold);font-size:21px}
.briefing{background:linear-gradient(145deg,rgba(18,20,28,.98),rgba(9,10,14,.98));border:1px solid rgba(255,111,159,.28);border-radius:25px;padding:19px;display:grid;grid-template-columns:1fr 62px;gap:12px;box-shadow:0 15px 50px rgba(0,0,0,.28)}
.briefing h2{font-size:17px;margin:0 0 10px}.briefing p{color:#b2bac7;line-height:1.45;margin:0}.brief-orb{width:58px;height:58px;border-radius:50%;background:conic-gradient(var(--gold),var(--rose),#6d4cff,var(--gold));position:relative;box-shadow:0 0 26px rgba(255,111,159,.25);animation:spin 6s linear infinite}.brief-orb:after{content:"";position:absolute;inset:9px;background:#0a0b10;border-radius:50%}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:15px}.tile{min-height:130px;background:linear-gradient(145deg,#111620,#0b0e14);border:1px solid var(--line);border-radius:21px;padding:14px;text-align:left;color:white}.tile:active{transform:scale(.98)}.tile i{font-style:normal;color:var(--rose);font-size:22px}.tile strong{display:block;font-size:31px;font-weight:500;margin:18px 0 4px}.tile span{color:#a5adba;font-size:13px}.tile.gold i{color:var(--gold)}.tile.peach i{color:var(--peach)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin:27px 2px 13px}.section-head h2{font-size:21px;margin:0}.section-head button{border:0;background:none;color:var(--rose)}
.recommendations{display:grid;gap:10px}.rec{display:grid;grid-template-columns:45px 1fr auto;align-items:center;gap:12px;width:100%;border:1px solid var(--line);background:#0d1118;border-radius:19px;padding:14px;text-align:left;color:white}.rec-icon{width:43px;height:43px;border-radius:14px;display:grid;place-items:center;background:rgba(255,111,159,.09);color:var(--rose);border:1px solid rgba(255,111,159,.22)}.rec b{display:block}.rec small{display:block;color:var(--muted);margin-top:5px}.rec em{font-size:24px;font-style:normal;color:#677083}
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(100%,560px);height:calc(78px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);padding:9px 11px env(safe-area-inset-bottom);background:rgba(9,11,16,.95);backdrop-filter:blur(22px);border-top:1px solid var(--line);z-index:20}.bottom button{border:0;background:none;color:#777f8e;display:flex;flex-direction:column;align-items:center;gap:4px}.bottom button.active{color:var(--rose)}.bottom span{font-size:23px}.bottom small{font-size:11px}.bottom .ai span{width:50px;height:50px;border-radius:17px;margin-top:-25px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--rose));color:#160b0e;box-shadow:0 0 25px rgba(255,111,159,.25)}
.search{height:55px;border:1px solid var(--line);background:#0b0e13;border-radius:18px;display:flex;align-items:center;padding:0 15px;gap:10px}.search input{border:0;outline:0;background:transparent;color:white;width:100%}.chips{display:flex;gap:8px;overflow:auto;padding:14px 0}.chips button{border:1px solid var(--line);background:#0c0f15;color:#929baa;border-radius:999px;padding:9px 15px;white-space:nowrap}.chips .on{background:linear-gradient(90deg,var(--gold),var(--rose));color:#190d0f;border:0}
.list{display:grid;gap:11px}.mail{display:grid;grid-template-columns:50px 1fr auto;gap:12px;background:#10151f;border:1px solid var(--line);border-radius:21px;padding:14px;text-align:left;color:white}.sender{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),var(--rose));color:#180b0d;font-weight:700}.mail b,.mail strong{display:block}.mail strong{font-weight:500;margin-top:5px}.mail p{color:#80899a;margin:5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mail small{color:var(--gold)}.star{color:var(--rose);font-size:21px}
.aihead{display:flex;gap:13px;align-items:center}.aihead img{width:62px;height:62px;border-radius:20px}.aihead h2{margin:0}.aihead p{color:var(--gold);margin:5px 0 0;font-family:monospace}.chat{display:grid;gap:12px;margin-top:21px;padding-bottom:88px}.bubble{max-width:87%;border-radius:22px;padding:16px 18px;line-height:1.5}.assistant{background:#10141c;border:1px solid var(--line)}.user{justify-self:end;background:linear-gradient(135deg,#d98454,#e7588e)}
.composer{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);width:min(calc(100% - 36px),524px);display:flex;gap:8px;background:#0d1016;border:1px solid var(--line);padding:8px;border-radius:18px;z-index:19}.composer input{flex:1;background:none;border:0;outline:0;color:white;padding:0 8px}.composer button{width:42px;height:42px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--rose));color:#160b0d;font-size:23px}
.calendar{background:#10151f;border:1px solid var(--line);border-radius:25px;padding:17px}.cal-head{display:flex;align-items:center;justify-content:space-between}.cal-head button{width:40px;height:40px;border:0;background:#0b0e13;border-radius:50%;color:var(--gold);font-size:24px}.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;text-align:center}.week{color:#757f8f;margin:19px 0 9px;font-size:12px}.days button{aspect-ratio:1;border:0;background:none;color:#cbd2dc;border-radius:13px}.days button.today{border:1px solid var(--rose);background:rgba(255,111,159,.11);color:var(--rose)}
.events{display:grid;gap:10px}.event{display:grid;grid-template-columns:5px 1fr;gap:13px;background:#10151f;border-radius:18px;padding:16px}.event i{border-radius:4px;background:linear-gradient(var(--gold),var(--rose))}.event h3{margin:0 0 5px}.event p{margin:0;color:var(--muted)}
.settings{display:grid;gap:1px;background:#10151f;border-radius:22px;overflow:hidden}.settings button{display:grid;grid-template-columns:31px 1fr auto;align-items:center;border:0;border-bottom:1px solid rgba(242,179,95,.09);background:none;color:white;padding:17px;text-align:left}.settings em{font-style:normal;color:#677083;font-size:22px}
  </style>
</head>
<body>
<div id="splash" class="splash">
  <div class="brand-core">
    <div class="ring"></div><div class="ring r2"></div>
    <img class="brand-logo" src="icon.png" alt="VIVAFIX">
  </div>
  <h1>V I V A F I X</h1>
  <p>Planen. Verbinden. Erledigen.</p>
  <div class="loader"><i></i></div>
  <small>Systeme werden gestartet …</small>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="greeting"><img class="mini-logo" src="icon.png"><div><p class="eyebrow" id="eyebrow">GUTEN MORGEN 👋</p><h1 id="title">Koray</h1></div></div>
    <button class="bell">♧</button>
  </header>
  <main id="view"></main>
  <nav class="bottom">
    <button data-page="home" class="active"><span>⌂</span><small>Start</small></button>
    <button data-page="emails"><span>✉</span><small>E-Mails</small></button>
    <button data-page="ai" class="ai"><span>✦</span><small>AI Chat</small></button>
    <button data-page="calendar"><span>▣</span><small>Kalender</small></button>
    <button data-page="settings"><span>☷</span><small>Mehr</small></button>
  </nav>
</div>

<template id="home">
<section class="briefing"><div><h2>✦ Daily Briefing</h2><p>Du hast heute 3 Termine, 5 Aufgaben und 12 ungelesene E-Mails.</p></div><div class="brief-orb"></div></section>
<section class="grid">
<button class="tile" data-go="calendar"><i>▣</i><strong>3</strong><span>Termine heute</span></button>
<button class="tile" data-go="emails"><i>✉</i><strong>12</strong><span>E-Mails ungelesen</span></button>
<button class="tile gold"><i>✓</i><strong>5</strong><span>Aufgaben offen</span></button>
<button class="tile gold"><i>☁</i><strong>18°</strong><span>bewölkt</span></button>
<button class="tile peach"><i>◇</i><strong>2</strong><span>Pakete unterwegs</span></button>
<button class="tile"><i>▤</i><strong>4</strong><span>Notizen gesamt</span></button>
</section>
<div class="section-head"><h2>Empfehlungen</h2><button>Alle</button></div>
<section class="recommendations">
<button class="rec"><span class="rec-icon">✉</span><span><b>Lisa antworten</b><small>Projekt-Update · hohe Priorität</small></span><em>›</em></button>
<button class="rec"><span class="rec-icon">▣</span><span><b>Team-Meeting vorbereiten</b><small>Heute · 10:00 Uhr</small></span><em>›</em></button>
<button class="rec"><span class="rec-icon">€</span><span><b>Rechnung prüfen</b><small>Fällig in 2 Tagen</small></span><em>›</em></button>
</section>
</template>

<template id="emails">
<div class="search">⌕ <input placeholder="E-Mails durchsuchen…"></div>
<div class="chips"><button class="on">Wichtig</button><button>Ungelesen</button><button>Alle</button><button>Archiv</button></div>
<section class="list">
<button class="mail"><span class="sender">LM</span><span><b>Lisa Müller</b><strong>Projekt-Update</strong><p>Kannst du die Änderungen heute noch prüfen?</p><small>09:15 · Arbeit</small></span><span class="star">★</span></button>
<button class="mail"><span class="sender">AM</span><span><b>Amazon</b><strong>Bestellbestätigung</strong><p>Deine Bestellung wurde versendet.</p><small>08:42 · Bestellung</small></span><span class="star">☆</span></button>
<button class="mail"><span class="sender">TS</span><span><b>Tim Schneider</b><strong>Meeting verschoben</strong><p>Der Termin findet morgen statt.</p><small>Gestern · Kalender</small></span><span class="star">☆</span></button>
</section>
</template>

<template id="ai">
<section class="aihead"><img src="icon.png"><div><h2>VIVAFIX AI</h2><p>● Online · bereit</p></div></section>
<section class="chat"><div class="bubble assistant">Guten Morgen! Ich habe deinen Tag analysiert. Du solltest zuerst Lisa antworten und danach die Rechnung prüfen.</div><div class="bubble user">Was steht heute noch an?</div><div class="bubble assistant">Du hast drei Termine. Der nächste beginnt um 10:00 Uhr. Zwischen 13:30 und 15:00 Uhr hast du freie Fokuszeit.</div></section>
<form id="chatForm" class="composer"><input id="chatInput" placeholder="Frag VIVAFIX etwas…"><button>↑</button></form>
</template>

<template id="calendar">
<section class="calendar"><div class="cal-head"><button>‹</button><h2>Juli 2026</h2><button>›</button></div><div class="week"><span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span></div><div class="days" id="days"></div></section>
<div class="section-head"><h2>Heute</h2><button>+ Termin</button></div>
<section class="events"><article class="event"><i></i><div><h3>Team-Meeting</h3><p>10:00–11:00 · Raum 1</p></div></article><article class="event"><i></i><div><h3>Mittagessen mit Lisa</h3><p>12:30–13:30 · Café am Markt</p></div></article><article class="event"><i></i><div><h3>Projektpräsentation</h3><p>15:00–16:30 · Online</p></div></article></section>
</template>

<template id="settings">
<section class="settings"><button><span>✦</span><b>KI-Einstellungen</b><em>›</em></button><button><span>⌁</span><b>Konten verbinden</b><em>›</em></button><button><span>♧</span><b>Benachrichtigungen</b><em>›</em></button><button><span>▣</span><b>Datenschutz & Sicherheit</b><em>›</em></button><button><span>◐</span><b>Design</b><em>›</em></button><button><span>文</span><b>Sprache</b><em>›</em></button><button><span>?</span><b>Hilfe & Support</b><em>›</em></button></section>
</template>

<script>
const app=document.getElementById('app'),view=document.getElementById('view'),title=document.getElementById('title');
const nav=[...document.querySelectorAll('.bottom button')];
const map={home:['home','Koray'],emails:['emails','E-Mails'],ai:['ai','VIVAFIX AI'],calendar:['calendar','Kalender'],settings:['settings','Mehr']};
function render(page='home'){const [id,t]=map[page]||map.home;view.replaceChildren(document.getElementById(id).content.cloneNode(true));title.textContent=t;nav.forEach(b=>b.classList.toggle('active',b.dataset.page===page));localStorage.setItem('vf-page',page);view.querySelectorAll('[data-go]').forEach(x=>x.onclick=()=>render(x.dataset.go));if(page==='calendar')calendar();if(page==='ai')chat();scrollTo(0,0)}
function calendar(){const d=document.getElementById('days');for(let i=0;i<2;i++)d.append(document.createElement('span'));for(let n=1;n<=31;n++){let b=document.createElement('button');b.textContent=n;if(n===21)b.className='today';b.onclick=()=>{d.querySelectorAll('button').forEach(x=>x.classList.remove('today'));b.classList.add('today')};d.append(b)}}
function chat(){const f=document.getElementById('chatForm'),i=document.getElementById('chatInput'),c=view.querySelector('.chat');f.onsubmit=e=>{e.preventDefault();if(!i.value.trim())return;let u=document.createElement('div');u.className='bubble user';u.textContent=i.value;c.append(u);i.value='';setTimeout(()=>{let a=document.createElement('div');a.className='bubble assistant';a.textContent='Das ist momentan eine Demo-Antwort. Die echte KI verbinden wir im nächsten Entwicklungsschritt.';c.append(a);a.scrollIntoView({behavior:'smooth'})},400)}}
nav.forEach(b=>b.onclick=()=>render(b.dataset.page));
setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>{document.getElementById('splash').remove();app.classList.remove('hidden');render(localStorage.getItem('vf-page')||'home')},550)},2800);
</script>
</body>
</html>
