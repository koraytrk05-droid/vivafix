let ambientCtx=null,ambientNodes=[],ambientOn=false;
function startAmbient(){
 if(ambientOn)return;
 ambientOn=true;
 ambientCtx=ambientCtx||new (window.AudioContext||window.webkitAudioContext)();
 if(ambientCtx.state==='suspended')ambientCtx.resume();
 const master=ambientCtx.createGain();master.gain.value=.035;master.connect(ambientCtx.destination);
 const noise=ambientCtx.createBufferSource(),buffer=ambientCtx.createBuffer(1,ambientCtx.sampleRate*2,ambientCtx.sampleRate),data=buffer.getChannelData(0);
 for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*.45;
 noise.buffer=buffer;noise.loop=true;
 const filter=ambientCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=700;
 const gain=ambientCtx.createGain();gain.gain.value=.6;
 noise.connect(filter);filter.connect(gain);gain.connect(master);noise.start();
 const osc=ambientCtx.createOscillator(),oscGain=ambientCtx.createGain();
 osc.type='sine';osc.frequency.value=92;oscGain.gain.value=.08;osc.connect(oscGain);oscGain.connect(master);osc.start();
 ambientNodes=[noise,osc,master];$('#soundToggle')?.classList.add('on');localStorage.setItem('vf_ambient','1');
}
function stopAmbient(){
 ambientOn=false;
 ambientNodes.forEach(n=>{try{n.stop?.()}catch{}try{n.disconnect?.()}catch{}});

}

let audioReady=false;
function warmAudio(){

function aiSwooshSound(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();

    const now=audioCtx.currentTime;
    const master=audioCtx.createGain();
    master.gain.setValueAtTime(.0001,now);
    master.gain.exponentialRampToValueAtTime(.11,now+.035);
    master.gain.exponentialRampToValueAtTime(.0001,now+.34);
    master.connect(audioCtx.destination);

    const length=Math.max(1,Math.floor(audioCtx.sampleRate*.36));
    const buffer=audioCtx.createBuffer(1,length,audioCtx.sampleRate);
    const data=buffer.getChannelData(0);
    for(let i=0;i<length;i++){
      const fade=1-i/length;
      data[i]=(Math.random()*2-1)*fade;
    }

    const noise=audioCtx.createBufferSource();
    const filter=audioCtx.createBiquadFilter();
    const noiseGain=audioCtx.createGain();
    noise.buffer=buffer;
    filter.type='bandpass';
    filter.Q.value=.75;
    filter.frequency.setValueAtTime(420,now);
    filter.frequency.exponentialRampToValueAtTime(2400,now+.22);
    filter.frequency.exponentialRampToValueAtTime(900,now+.34);
    noiseGain.gain.setValueAtTime(.0001,now);
    noiseGain.gain.exponentialRampToValueAtTime(.42,now+.045);
    noiseGain.gain.exponentialRampToValueAtTime(.0001,now+.34);
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(master);

    const tone=audioCtx.createOscillator();
    const toneGain=audioCtx.createGain();
    tone.type='sine';
    tone.frequency.setValueAtTime(260,now);
    tone.frequency.exponentialRampToValueAtTime(760,now+.20);
    toneGain.gain.setValueAtTime(.0001,now);
    toneGain.gain.exponentialRampToValueAtTime(.16,now+.04);
    toneGain.gain.exponentialRampToValueAtTime(.0001,now+.28);
    tone.connect(toneGain);
    toneGain.connect(master);

    noise.start(now);
    noise.stop(now+.36);
    tone.start(now);
    tone.stop(now+.30);
  }catch{}
}

function clickSound(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
    o.type='sine';o.frequency.setValueAtTime(520,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(290,audioCtx.currentTime+.035);
    f.type='lowpass';f.frequency.value=1400;
    g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.055,audioCtx.currentTime+.006);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.05);
    o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.055);
  }catch{}
}

function islandPortalSound(){
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
    const now=audioCtx.currentTime;
    const master=audioCtx.createGain();
    master.gain.setValueAtTime(.0001,now);
    master.gain.exponentialRampToValueAtTime(.18,now+.025);
    master.gain.exponentialRampToValueAtTime(.0001,now+.72);
    master.connect(audioCtx.destination);
    [110,220,440].forEach((frequency,index)=>{
      const oscillator=audioCtx.createOscillator();
      const gain=audioCtx.createGain();
      oscillator.type=index===0?'sine':'triangle';
      oscillator.frequency.setValueAtTime(frequency,now);
      oscillator.frequency.exponentialRampToValueAtTime(frequency*(2.4+index*.35),now+.55);
      gain.gain.setValueAtTime(.0001,now);
      gain.gain.exponentialRampToValueAtTime(.16/(index+1),now+.035+index*.025);
      gain.gain.exponentialRampToValueAtTime(.0001,now+.58);
      oscillator.connect(gain);gain.connect(master);
      oscillator.start(now+index*.025);oscillator.stop(now+.65);
    });
  }catch{}
}
function prepareIslandPortal(){
  const portal=$('#aiPortal');if(!portal)return;
  portal.querySelectorAll('.ai-particle').forEach(node=>node.remove());

    const particle=document.createElement('i');
    particle.className='ai-particle';
    particle.style.setProperty('--a',`${i*(360/32)}deg`);
    particle.style.setProperty('--d',`${125+(i%8)*24}px`);
    portal.appendChild(particle);
  }
  islandPortalSound();
}

let navigationLocked=false;
function goToPage(page,source){
  if(!page||navigationLocked)return;
  navigationLocked=true;
  clickSound();

  const unlock=()=>{navigationLocked=false};

  try{
    if(page==='ai'&&source==='island'){
      prepareIslandPortal();
      const portal=$('#aiPortal');
      if(portal){
        portal.classList.remove('show');
        void portal.offsetWidth;
        portal.classList.add('show');
      }
      setTimeout(()=>{
        try{render('ai')}
        catch(error){
          console.error('VIVAFIX navigation error:',error);
          toast('Seite konnte nicht geöffnet werden');
        }
        finally{unlock()}
      },360);
      setTimeout(()=>portal?.classList.remove('show'),850);
      return;
    }

    render(page);
  }catch(error){
    console.error('VIVAFIX navigation error:',error);
    toast('Seite konnte nicht geöffnet werden');
  }finally{
    unlock();
  }
}

(function detectPerformance(){
  let frames=0,start=performance.now();
  function tick(now){
    frames++;
    if(now-start<1200){requestAnimationFrame(tick);return}
    const fps=frames/((now-start)/1000);
    if(fps<45)enableLowPowerMode();
  }

function weatherIsNight(){
  const offsetSeconds=Number(weatherData?.utc_offset_seconds)||0;
  const localNow=new Date(Date.now()+offsetSeconds*1000);
  const localDate=localNow.toISOString().slice(0,10);
  const nowMinutes=localNow.getUTCHours()*60+localNow.getUTCMinutes();

  const sunrise=weatherData?.daily?.sunrise?.[0];
  const sunset=weatherData?.daily?.sunset?.[0];

  const timeToMinutes=value=>{
    const match=String(value||'').match(/T(\d{2}):(\d{2})/);
    return match?Number(match[1])*60+Number(match[2]):null;
  };

  if(sunrise&&sunset&&String(sunrise).startsWith(localDate)){
    const sunriseMinutes=timeToMinutes(sunrise);
    const sunsetMinutes=timeToMinutes(sunset);
    if(sunriseMinutes!==null&&sunsetMinutes!==null){
      return nowMinutes<sunriseMinutes||nowMinutes>=sunsetMinutes;
    }
  }

  return nowMinutes<360||nowMinutes>=1260;
}

async function searchWeatherLocation(){
 const input=$('#weatherQuery'),box=$('#weatherResults');
 if(!input||!box)return;
 const q=input.value.trim();
 if(q.length<2){toast('Bitte mindestens 2 Zeichen eingeben');input.focus();return}
 box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Städte und Länder werden weltweit gesucht…</div>';
 try{
   const url=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=30&language=de&format=json`;
   const r=await fetch(url);
   if(!r.ok)throw new Error('Ortssuche fehlgeschlagen');
   const d=await r.json(),results=(d.results||[]).filter(x=>Number.isFinite(x.latitude)&&Number.isFinite(x.longitude));
   if(!results.length){
     box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Kein Ort gefunden. Versuche Stadt + Land, zum Beispiel „Paris Frankreich“.</div>';

   }).join('');
   $$('[data-weather-result]').forEach(button=>{
     button.onclick=()=>{
       const x=results[Number(button.dataset.weatherResult)];

       });
     };
   });

   box.innerHTML='<div style="color:rgba(255,255,255,.75);font-size:12px">Die weltweite Ortssuche ist gerade nicht erreichbar.</div>';
 }
}
async function loadWeatherCoords(latitude,longitude,location){
 toast('Wetter wird geladen…');
 try{
   const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,is_day&daily=sunrise,sunset&forecast_days=1&timezone=auto`);
   if(!r.ok)throw new Error();
   weatherData=await r.json();
   weatherLocation={...(location||{}),latitude,longitude};
   localStorage.setItem('vf_weather',JSON.stringify(weatherData));
   localStorage.setItem('vf_weather_location',JSON.stringify(weatherLocation));
   localStorage.setItem('vf_weather_fetched_at',String(Date.now()));

async function loadApproximateWeather(){
  toast('Ungefährer Standort wird ermittelt…');
  try{
    const response=await fetch('https://ipwho.is/');
    if(!response.ok)throw new Error('IP-Ortung nicht erreichbar');
    const data=await response.json();
    if(data.success===false||!Number.isFinite(data.latitude)||!Number.isFinite(data.longitude)){
      throw new Error('Kein ungefährer Standort gefunden');
    }
    await loadWeatherCoords(data.latitude,data.longitude,{
      name:data.city||'Ungefährer Standort',
      admin1:data.region||'',
      country:data.country||'',
      timezone:data.timezone?.id||''
    });
    toast('Ungefährer Standort verwendet');
  }catch(error){
    console.error('Approximate location error:',error);
    toast('Bitte Ort oben manuell eingeben');
    const query=$('#weatherQuery');
    if(query)setTimeout(()=>query.focus(),120);
  }
}

function loadWeather(){
  if(!navigator.geolocation){
    loadApproximateWeather();
    return;
  }

  toast('Standort wird ermittelt…');
  navigator.geolocation.getCurrentPosition(
    position=>loadWeatherCoords(
      position.coords.latitude,
      position.coords.longitude,
      {name:'Aktueller Standort',admin1:'',country:''}
    ),
    error=>{
      console.warn('Precise geolocation unavailable:',error);
      loadApproximateWeather();
    },
    {timeout:9000,maximumAge:600000,enableHighAccuracy:false}
  );
}

function bindPersistentField(selector,key,defaultValue=''){
  const field=$(selector);
  if(!field)return null;

  const saved=localStorage.getItem('vf_draft_'+key);
  if(saved!==null){
    field.value=saved;
  }else if(!field.value&&defaultValue){
    field.value=defaultValue;
  }

  const save=()=>localStorage.setItem('vf_draft_'+key,field.value);
  field.addEventListener('input',save);
  field.addEventListener('change',save);
  return field;
}

function clearPersistentFields(keys){
  keys.forEach(key=>localStorage.removeItem('vf_draft_'+key));
}

function enableEditableControls(root=document){
  if(!root)return;
  root.querySelectorAll('input,textarea,select').forEach(control=>{
    control.disabled=false;
    if(control.tagName!=='SELECT')control.readOnly=false;
    control.style.pointerEvents='auto';
    control.style.position='relative';
    control.style.zIndex='60';
  });
}

function typeTextIntoBubble(element,text,onDone){
  if(!element){onDone?.();return}
  element.innerHTML='';
  const content=document.createElement('span');
  const cursor=document.createElement('span');
  cursor.className='type-cursor';
  element.append(content,cursor);
  const words=String(text).split(/(\s+)/);
  let i=0;
  const tick=()=>{
    if(i>=words.length){
      cursor.remove();
      onDone?.();
      scrollToLatestChat('smooth');
      return;
    }
    const part=words[i++];
    content.textContent+=part;
    scrollToLatestChat('auto');
    setTimeout(tick,/[.!?]$/.test(part.trim())?75:part.trim()?20:7);
  };
  tick();
}
function normalizeLocalText(value){
  return String(value||'')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^\p{L}\p{N}\s]/gu,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function localPick(list){
  return list[Math.floor(Math.random()*list.length)];
}
function assistant(q){
  const text=String(q||'').trim();
  const l=normalizeLocalText(text);
  const tasks=store.get('tasks');
  const events=store.get('events');
  const notes=store.get('notes');
  const open=tasks.filter(t=>!t.done);
  const todayTasks=open.filter(t=>t.date===today());
  const todayEvents=events.filter(e=>e.date===today()).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const high=open.filter(t=>t.priority==='hoch');

  const createTask=text.match(/(?:erstelle|mach|lege|füge)\s+(?:mir\s+)?(?:eine\s+)?aufgabe\s*:?\s*(.+)/i);
  if(createTask){
    const title=createTask[1].trim();
    tasks.push({id:crypto.randomUUID(),title,date:today(),priority:'mittel',done:false});
    store.set('tasks',tasks);
    return `Erledigt. Ich habe „${title}“ als Aufgabe für heute gespeichert.`;
  }

  const createEvent=text.match(/(?:erstelle|mach|lege|füge)\s+(?:mir\s+)?(?:einen\s+)?termin\s*:?\s*(.+)/i);
  if(createEvent){
    return `Ich habe „${createEvent[1].trim()}“ verstanden. Öffne bitte kurz „Plan“, damit du Datum und Uhrzeit sicher festlegen kannst.`;
  }

  if(/^(hallo|hi|hey|moin|guten morgen|guten tag)\b/.test(l)){
    return localPick([
      `Hallo Koray. Du hast aktuell ${open.length} offene Aufgabe${open.length===1?'':'n'}. Womit möchtest du anfangen?`,
      'Hey Koray. Sollen wir zuerst deinen Tag, deine Aufgaben oder deine E-Mails anschauen?',
      'Hallo. Was möchtest du heute gemeinsam ordnen?'
    ]);
  }

  if(/\b(danke|dankeschon|dankeschön)\b/.test(l)){
    return localPick(['Gerne. Dafür bin ich da.','Sehr gern. Was steht als Nächstes an?','Kein Problem. Wir machen direkt weiter.']);
  }

  if(/wer bist du|was kannst du|stell dich vor/.test(l)){
    return 'Ich bin der kostenlose lokale Assistent von VIVAFIX. Ich kann Aufgaben, Termine, Notizen, Wetter und geladene E-Mails auswerten. Freie Gespräche sind eingeschränkt, dafür entstehen keine laufenden Kosten.';
  }

  if(/wetter|temperatur|regen|sonne/.test(l)){
    if(!weatherData?.current){
      return 'Ich habe gerade keine Wetterdaten. Öffne einmal den Wetterbereich, damit VIVAFIX deinen Ort laden kann.';
    }
    const w=weatherData.current;
    const [,label]=weatherText(w.weather_code);
    return `Aktuell sind es ${Math.round(w.temperature_2m)} Grad bei ${label.toLowerCase()}. Gefühlt sind es ${Math.round(w.apparent_temperature)} Grad.`;
  }

  if(/heute|tagesplan|was steht an|mein tag/.test(l)){
    const parts=[];
    parts.push(todayEvents.length
      ?`Heute stehen ${todayEvents.length} Termin${todayEvents.length===1?'':'e'} an: ${todayEvents.map(e=>`${e.time||'ohne Uhrzeit'} ${e.title}`).join(', ')}.`
      :'Heute ist kein Termin gespeichert.');
    parts.push(todayTasks.length
      ?`Für heute sind ${todayTasks.length} Aufgabe${todayTasks.length===1?'':'n'} offen: ${todayTasks.map(t=>t.title).join(', ')}.`
      :open.length
        ?`Du hast insgesamt ${open.length} offene Aufgabe${open.length===1?'':'n'}, aber keine ist ausdrücklich für heute datiert.`
        :'Deine Aufgabenliste ist leer.');
    if(high.length)parts.push(`Besonders wichtig: ${high.slice(0,3).map(t=>t.title).join(', ')}.`);
    return parts.join(' ');
  }

  if(/wichtig|dringend|prioritat|priorität/.test(l)){
    return high.length
      ?`Diese Aufgaben haben hohe Priorität: ${high.map(t=>t.title).join(', ')}.`
      :'Aktuell ist keine offene Aufgabe als besonders wichtig markiert.';
  }

  if(/aufgabe|aufgaben|todo|to do|offen/.test(l)){
    if(!open.length)return 'Sehr gut – momentan ist keine Aufgabe offen.';
    return `Du hast ${open.length} offene Aufgabe${open.length===1?'':'n'}. ${open.slice(0,6).map((t,i)=>`${i+1}. ${t.title}`).join(' ')}`;
  }

  if(/termin|termine|kalender|meeting/.test(l)){
    if(!events.length)return 'Es sind noch keine Termine gespeichert.';
    if(todayEvents.length){
      return `Heute stehen ${todayEvents.length} Termin${todayEvents.length===1?'':'e'} an: ${todayEvents.map(e=>`${e.time||'ohne Uhrzeit'} ${e.title}`).join(', ')}.`;
    }
    const upcoming=[...events].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,5);
    return `Die nächsten Termine sind: ${upcoming.map(e=>`${e.date} ${e.time||''} ${e.title}`).join(' · ')}.`;
  }

  if(/notiz|notizen/.test(l)){
    if(!notes.length)return 'Du hast noch keine Notizen gespeichert.';
    return `Du hast ${notes.length} Notiz${notes.length===1?'':'en'}. Zuletzt gespeichert: ${notes.slice(-3).map(n=>n.title).join(', ')}.`;
  }

  if(/mail|email|e mail|posteingang/.test(l)){
    if(!gmailMessages.length){
      return 'Gmail ist verbunden, aber im Moment sind keine E-Mails geladen. Öffne Mail und tippe auf „Neu laden“.';
    }
    return `Aktuell sind ${gmailMessages.length} E-Mails geladen. Die neuesten Betreffzeilen sind: ${gmailMessages.slice(0,4).map(m=>m.subject||'(ohne Betreff)').join(' · ')}.`;
  }

  if(/organisier|planen|was soll ich tun|hilfe/.test(l)){
    if(high.length)return `Mein Vorschlag: Starte mit „${high[0].title}“. Plane dafür 25 Minuten konzentrierte Zeit ein.`;
    if(todayTasks.length)return `Beginne mit „${todayTasks[0].title}“. Danach prüfst du deine Termine und E-Mails.`;
    if(open.length)return `Nimm zuerst „${open[0].title}“ und arbeite zehn Minuten ohne Unterbrechung daran.`;
    return 'Dein Plan ist gerade frei. Erstelle eine kleine konkrete Aufgabe, die du heute sicher abschließen kannst.';
  }

  if(/motivier|motivation/.test(l)){
    return localPick([
      'Du musst nicht alles auf einmal schaffen. Konzentriere dich nur auf den nächsten klaren Schritt.',
      'Ein kleiner erledigter Punkt ist besser als fünf offene Gedanken. Starte für zehn Minuten.',
      'Nicht Perfektion zählt, sondern Fortschritt. Was ist der kleinste sinnvolle nächste Schritt?'
    ]);
  }

  return localPick([
    'Im kostenlosen Offline-Modus helfe ich dir am besten bei Aufgaben, Terminen, Notizen, Wetter und geladenen E-Mails.',
    'Formuliere deine Frage bitte etwas konkreter, zum Beispiel: „Was steht heute an?“ oder „Welche Aufgabe ist wichtig?“',
    'Freie Gespräche sind lokal eingeschränkt. Bei deiner Organisation kann ich dir aber direkt helfen.'
  ]);
}

  const move=()=>{
    const bottom=document.getElementById('chatBottom');
    const last=document.querySelector('#chat .bubble:last-child');
    const target=bottom||last;
    if(target){
      target.scrollIntoView({behavior,block:'end'});
    }
    window.scrollTo({
      top:Math.max(document.body.scrollHeight,document.documentElement.scrollHeight),
      behavior
    });
  };
  requestAnimationFrame(move);
  setTimeout(move,70);
  setTimeout(move,180);
  setTimeout(move,360);
}

function chat(){
  let history=store.get('chat',[{role:'ai',text:'Hallo. Ich bin VIVAFIX. Was möchtest du heute ordnen?'}]);
  let sending=false;

  const chatEl=$('#chat');
  const form=$('#chatForm');
  const input=$('#chatInput');
  const sendButton=$('#chatSend');
  const chips=document.querySelector('.chips');
  const mode=$('#aiMode');

  if(mode){
    mode.classList.remove('online');
    const label=mode.querySelector('span');
    if(label)label.textContent='Kostenloser Offline-Modus';
  }

  const draw=()=>{
    chatEl.innerHTML=history.map(x=>`<div class="bubble ${x.role==='me'?'me':'ai'}">${esc(x.text)}</div>`).join('');
    forceChatToBottom('auto');
  };

  const setBusy=value=>{
    sending=value;
    form.classList.toggle('sending',value);
    sendButton.disabled=value;
    input.disabled=value;
    $$('.chips button').forEach(button=>{
      button.classList.toggle('prompt-disabled',value);
      button.disabled=value;
    });
  };

  const send=async raw=>{
    const message=String(raw||'').trim();
    if(!message)return;
    if(sending){
      toast('VIVAFIX schreibt gerade …');
      forceChatToBottom('smooth');
      return;
    }

    setBusy(true);
    history.push({role:'me',text:message});
    draw();

    chatEl.insertAdjacentHTML('beforeend',typingBubbleMarkup());
    const typingStart=chatEl.querySelector('[data-typing="1"]');
    typingStart?.classList.add('chat-jump-flash');
    forceChatToBottom('smooth');

    const context={
      tasks:store.get('tasks'),
      events:store.get('events'),
      notes:store.get('notes'),
      weather:weatherData,
      location:weatherLocation,
      emails:gmailMessages.slice(0,25).map(mail=>({
        from:mail.from,
        subject:mail.subject,
        date:mail.date,
        snippet:mail.snippet
      })),
      history:history.slice(-12)
    };

    let answer;
    try{
      answer=await getAIResponse(message,context);
    }catch(error){
      console.error(error);
      answer=assistant(message);
    }

    const typing=chatEl.querySelector('[data-typing="1"]');
    if(typing)typing.removeAttribute('data-typing');

    aiSwooshSound();
    typeTextIntoBubble(typing,answer,()=>{
      history.push({role:'ai',text:answer});
      store.set('chat',history);
      setBusy(false);
      input.focus();
      forceChatToBottom('smooth');
    });
  };

  draw();

  form.onsubmit=event=>{
    event.preventDefault();
    const value=input.value;
    input.value='';
    send(value);
  };

  sendButton.onclick=event=>{
    event.preventDefault();
    event.stopPropagation();
    const value=input.value;
    input.value='';
    send(value);
  };

  input.onkeydown=event=>{
    if(event.key==='Enter'&&!event.shiftKey){
      event.preventDefault();
      const value=input.value;
      input.value='';
      send(value);
    }
  };

  input.onfocus=()=>setTimeout(()=>forceChatToBottom('smooth'),260);

  if(chips){
    chips.onclick=event=>{
      const button=event.target.closest('button[data-prompt]');
      if(!button)return;
      event.preventDefault();
      event.stopPropagation();
      const prompt=button.dataset.prompt||button.textContent.trim();
      input.value='';
      send(prompt);
      forceChatToBottom('smooth');
    };
  }

  setTimeout(()=>forceChatToBottom('auto'),180);
}

function initGoogle(){const id=localStorage.getItem('gmailClientId');if(!id||!window.google?.accounts?.oauth2)return false;tokenClient=google.accounts.oauth2.initTokenClient({client_id:id,scope:'https://www.googleapis.com/auth/gmail.readonly',callback:r=>{if(r.error)return alert('Google-Anmeldung fehlgeschlagen: '+r.error);accessToken=r.access_token;gmailMessages=[];gmailNextPageToken='';render('mail');loadGmail(false)}});return true}
async function gmailFetch(path){const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/'+path,{headers:{Authorization:'Bearer '+accessToken}}),d=await r.json();if(!r.ok)throw new Error(d.error?.message||'Gmail-Fehler');return d}
async function loadGmail(append=false){
 if(gmailLoading)return;
 const list=$('#mailList');
 if(!accessToken){list.innerHTML='<div class="empty">Verbinde zuerst dein Gmail-Konto.</div>';drawMailControls();return}
 gmailLoading=true;
 if(!append)list.innerHTML='<div class="panel">E-Mails werden geladen…</div>';
 try{
   const token=append&&gmailNextPageToken?'&pageToken='+encodeURIComponent(gmailNextPageToken):'';
   const r=await gmailFetch('messages?maxResults=25&q=in%3Ainbox'+token);
   const batch=await Promise.all((r.messages||[]).map(async x=>{
     const m=await gmailFetch(`messages/${x.id}?format=metadata&metadataHeaders=From&metadataHeaders=Subject&metadataHeaders=Date`);
     const hs=m.payload?.headers||[],h=n=>hs.find(z=>z.name.toLowerCase()===n.toLowerCase())?.value||'';
     return{id:x.id,from:decodeEntities(h('From')),subject:decodeEntities(h('Subject')||'(Kein Betreff)'),date:h('Date'),snippet:decodeEntities(m.snippet||'')};
   }));
   gmailMessages=append?[...gmailMessages,...batch]:batch;
   gmailNextPageToken=r.nextPageToken||'';
   drawMail(gmailMessages);
 }catch(e){list.innerHTML=`<div class="panel">${esc(e.message)}</div>`}
 finally{gmailLoading=false;drawMailControls()}
}
function drawMail(a){
 const list=$('#mailList');
 list.innerHTML=a.length?a.map(m=>{const b=senderBrand(m.from);return `<article class="mail-card" data-mail-id="${m.id}" role="button"><div class="mail-avatar ${b.cls}"><span class="mail-brand-mark">${esc(b.mark)}</span></div><div><div class="mail-head"><div class="mail-from">${esc(shortSender(m.from))}</div><div class="mail-date">${esc(formatMailDate(m.date))}</div></div><div class="mail-subject">${esc(m.subject)}</div><div class="mail-snippet">${esc(m.snippet)}</div></div></article>`}).join(''):'<div class="empty">Keine E-Mails gefunden.</div>';
 const count=$('#mailCount');if(count)count.textContent=`${a.length} E-Mails angezeigt`;
 $$('[data-mail-id]').forEach(card=>card.onclick=()=>{clickSound();openMail(card.dataset.mailId)});
}
function decodeBase64Url(v=''){try{const s=v.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(s)))}catch{return''}}
function collectParts(part,out={texts:[],htmls:[],attachments:[]}){
 if(!part)return out;
 if(part.filename)out.attachments.push(part.filename);
 const data=part.body?.data;
 if(data){
   const decoded=decodeBase64Url(data);
   if(part.mimeType==='text/plain')out.texts.push(decoded);
   if(part.mimeType==='text/html')out.htmls.push(decoded);
 }
 (part.parts||[]).forEach(p=>collectParts(p,out));return out;
}
function htmlToText(html=''){const d=document.createElement('div');d.innerHTML=html;return d.innerText||d.textContent||''}
async function openMail(id){
 const overlay=document.createElement('section');overlay.className='mail-detail';overlay.innerHTML='<div class="mail-detail-inner"><div class="panel">E-Mail wird geladen…</div></div>';document.body.appendChild(overlay);
 try{
   const m=await gmailFetch(`messages/${id}?format=full`);
   const hs=m.payload?.headers||[],h=n=>hs.find(z=>z.name.toLowerCase()===n.toLowerCase())?.value||'';
   const parts=collectParts(m.payload),body=(parts.texts.join('\n').trim()||htmlToText(parts.htmls.join('\n')).trim()||decodeEntities(m.snippet||''));
   overlay.innerHTML=`<div class="mail-detail-inner"><div class="mail-detail-head"><button id="closeMail">‹</button><div><div class="eyebrow">E-Mail</div><strong>${esc(shortSender(h('From')))}</strong></div></div><article class="mail-detail-card"><div style="color:var(--muted)">${esc(h('Date'))}</div><h2>${esc(decodeEntities(h('Subject')||'(Kein Betreff)'))}</h2><div style="color:var(--muted);overflow-wrap:anywhere">${esc(h('From'))}</div>${parts.attachments.length?`<div>${parts.attachments.map(x=>`<span class="attachment-chip">📎 ${esc(x)}</span>`).join('')}</div>`:''}<div class="mail-body">${esc(body)}</div></article></div>`;
   $('#closeMail').onclick=()=>{clickSound();overlay.remove()};
 }catch(e){overlay.innerHTML=`<div class="mail-detail-inner"><button id="closeMail" class="btn secondary">Zurück</button><div class="panel">${esc(e.message)}</div></div>`;$('#closeMail').onclick=()=>overlay.remove()}
}
function drawMailControls(){
 const wrap=$('#mailMoreWrap');if(!wrap)return;
 wrap.innerHTML=gmailNextPageToken?`<button id="loadMoreMail" class="btn secondary full">${gmailLoading?'Wird geladen…':'Weitere 25 E-Mails laden'}</button>`:'';
 if($('#loadMoreMail'))$('#loadMoreMail').onclick=()=>loadGmail(true);
}
function mail(){
 $('#connectGmail').onclick=()=>{if(!localStorage.getItem('gmailClientId')){toast('Client-ID zuerst unter Mehr speichern');render('more');return}if(!initGoogle())return alert('Google-Anmeldung lädt noch.');tokenClient.requestAccessToken({prompt:'consent'})};
 $('#refreshGmail').onclick=()=>{gmailMessages=[];gmailNextPageToken='';loadGmail(false)};
 $('#mailSearch').oninput=e=>{const q=e.target.value.toLowerCase();drawMail(gmailMessages.filter(m=>(m.from+' '+m.subject+' '+m.snippet).toLowerCase().includes(q)))};
 if(gmailMessages.length)drawMail(gmailMessages);else loadGmail(false);
 drawMailControls();
}
function more(){
 const clientInput=bindPersistentField('#clientId','clientId');
 const saveButton=$('#saveClient');
 const noteForm=$('#noteForm');
 const noteTitle=bindPersistentField('#noteTitle','noteTitle');
 const noteText=bindPersistentField('#noteText','noteText');
 enableEditableControls(document.querySelector('main'));

 if(clientInput){
   clientInput.value=localStorage.getItem('gmailClientId')||localStorage.getItem('vf_draft_clientId')||clientInput.value;
 }

 if(saveButton){
   saveButton.type='button';
   saveButton.onclick=()=>{
     const id=(clientInput?.value||'').trim();
     if(!id.endsWith('.apps.googleusercontent.com')){
       alert('Ungültige Client-ID.');
       clientInput?.focus();
       return;
     }
     localStorage.setItem('gmailClientId',id);
     localStorage.removeItem('vf_draft_clientId');
     toast('Client-ID gespeichert');
   };
 }

 let notes=store.get('notes');
 const draw=()=>{
   $('#noteList').innerHTML=notes.length
     ?notes.slice().reverse().map(n=>`<article class="item"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><footer><span>Notiz</span><button type="button" data-del="${n.id}">×</button></footer></article>`).join('')
     :'<div class="empty">Noch keine Notizen.</div>';

   $$('[data-del]').forEach(b=>b.onclick=()=>{
     notes=notes.filter(n=>n.id!==b.dataset.del);
     store.set('notes',notes);
     draw();
   });
 };

 noteForm.onsubmit=e=>{
   e.preventDefault();
   const titleValue=noteTitle.value.trim();
   const textValue=noteText.value.trim();
   if(!titleValue){noteTitle.focus();return}
   if(!textValue){noteText.focus();return}
   notes.push({id:crypto.randomUUID(),title:titleValue,text:textValue});
   store.set('notes',notes);
   clearPersistentFields(['noteTitle','noteText']);
   noteForm.reset();
   draw();
   toast('Notiz gespeichert');
 };
 draw();
}



render('home');
</script>
